<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>로지판 - 통합 현장 관리 (v2.1)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #f4f7f9; margin: 0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 550px; margin: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; position: relative; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #eee; color: #666; position: relative; }
        .tab-btn.active { background: #222; color: white; }
        .tab-dot { position: absolute; top: 6px; right: 8px; width: 9px; height: 9px; border-radius: 50%; background: #ff4d4f; display: none; box-shadow: 0 0 0 2px white; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        h2 { text-align: center; font-size: 20px; margin-bottom: 20px; color: #222; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        button.main-btn { width: 100%; padding: 16px; background: #222; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .notice-box { background: #fff9c4; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .notice-box small { display: block; color: #7f8c8d; margin-bottom: 5px; font-size: 11px; }
        .notice-text-collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        .notice-toggle-btn { background: none; border: none; color: #f39c12; font-size: 12px; font-weight: bold; cursor: pointer; padding: 4px 0 0 0; }
        .search-box { display: flex; gap: 8px; margin-top: 20px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 10px !important; font-size: 13px !important; }
        .search-btn { width: 70px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .refresh-btn { width: 70px; background: #34a853; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .report-item { background: #fff; border: 1px solid #eef0f2; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .report-item.done { opacity: 0.85; background: #f9f9f9; border: 1px solid #ddd; }
        .report-item.has-new { border: 2px solid #ff4d4f; box-shadow: 0 2px 8px rgba(255,77,79,0.15); }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .wait { background: #fff3e0; color: #ef6c00; }
        .done { background: #e8f5e9; color: #2e7d32; }
        .talking { background: #e3f2fd; color: #0d47a1; }
        .new-badge { background: #ff4d4f; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .comment-section { display: none; margin-top: 10px; background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 13px; border: 1px solid #eee; }
        .comment-bubble { padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; line-height: 1.4; word-break: break-word; }
        .admin-msg { background: #e7f3ff; border-left: 4px solid #1a73e8; }
        .user-msg { background: #f0f0f0; border-left: 4px solid #999; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); color: white; text-align: center; padding-top: 220px; z-index: 1000; font-size: 16px; }
        #loading-progress { width: 70%; max-width: 300px; margin: 20px auto 0; background: rgba(255,255,255,0.2); border-radius: 8px; overflow: hidden; height: 14px; display: none; }
        #loading-progress-bar { height: 100%; background: #4CAF50; width: 0%; transition: width 0.3s; border-radius: 8px; }
        .reply-box { margin-top: 10px; background: #e7f3ff; padding: 10px; border-radius: 8px; border-left: 4px solid #1877f2; font-size: 13px; }
        #photoPreview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .preview-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .preview-thumb .remove-btn { position: absolute; top: 2px; right: 2px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.7); color: white; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
        .attached-photos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .attached-photos img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #eee; transition: transform 0.15s; }
        .attached-photos img:hover { transform: scale(1.05); }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 4px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        #lightbox-close { position: absolute; top: 20px; right: 25px; background: rgba(255,255,255,0.15); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        .draft-notice { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; border-radius: 6px; padding: 8px 12px; margin-top: 10px; font-size: 13px; display: none; }
        .draft-notice button { background: none; border: none; color: #1a73e8; font-weight: bold; cursor: pointer; margin-left: 8px; text-decoration: underline; font-size: 13px; }
    </style>
</head>
<body>

<div id="loading">
    🚀 <span id="loadingMsg">데이터를 처리 중입니다...</span>
    <div id="loading-progress"><div id="loading-progress-bar"></div></div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" onclick="event.stopPropagation()">
</div>

<div class="card">
    <div class="tabs">
        <button id="tab-report" class="tab-btn active" onclick="switchTab('report')">
            📷 현장보고
            <span id="dot-report" class="tab-dot"></span>
        </button>
        <button id="tab-board" class="tab-btn" onclick="switchTab('board')">
            📢 공지/소통
            <span id="dot-board" class="tab-dot"></span>
        </button>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:15px; align-items:center;">
        <div id="userDisplay" style="flex:1; background:#f0f2f5; padding:10px; border-radius:8px; text-align:center; font-weight:bold; font-size:14px; cursor:pointer;" onclick="askName()">👤 작업자 등록 (클릭)</div>
        <button id="notifBtn" onclick="enableNotifications()" style="background:#fbbc04; color:white; border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:bold; cursor:pointer; white-space:nowrap;">🔔 알림 켜기</button>
    </div>

    <!-- 알림 진단용 - 작업자가 본인 폰 알림 동작 확인 -->
    <div style="text-align:right; margin-bottom:10px;">
        <button onclick="testLocalNotification()" style="background:none; border:1px dashed #ccc; color:#999; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;">🧪 알림 테스트</button>
    </div>

    <input type="hidden" id="userName">

    <div id="section-report">
        <h2>👷 현장 작업 보고</h2>
        <label>📌 제목</label>
        <input type="text" id="reportTitle" placeholder="예: 브랜드 입고 완료했습니다">
        <label>📸 사진 촬영 / 첨부</label>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="updatePhotoPreview()">
        <div id="photoPreview"></div>
        <label>📝 상세 내용</label>
        <textarea id="reportText" rows="4" placeholder="상세 내용을 입력하세요"></textarea>
        <div id="reportDraftNotice" class="draft-notice">
            💾 작성하던 내용이 있어요. <button onclick="restoreReportDraft()">불러오기</button> <button onclick="clearReportDraft(true)">버리기</button>
        </div>
        <button class="main-btn" onclick="uploadAndSend()">🚀 확인요청 보내기</button>
        <hr style="margin-top:25px; border:0; border-top:1px solid #eee;">
        <div class="search-box">
            <input type="text" id="searchKeyword" class="search-input" placeholder="제목 검색 시 완료 된 요청 검색가능">
            <button class="search-btn" onclick="searchReports()">조회</button>
            <button class="refresh-btn" onclick="loadActiveReports()">🔄</button>
        </div>
        <div class="list-header">
            <div id="listTitle" style="font-size:13px; font-weight:bold; color:#666;">⏳ 현재 진행 중인 작업</div>
        </div>
        <div id="reportList"></div>
    </div>

    <div id="section-board" style="display:none;">
        <h2>📢 공지사항 및 소통</h2>
        <div class="notice-box">
            <small>최근 관리자 공지</small>
            <div id="notice-content" style="font-weight:bold; margin-bottom:5px;">불러오는 중...</div>
            <div id="notice-btn-container">
                <button id="notice-step-btn" onclick="handleNoticeStep(1)" style="background:none; border:none; color:#f39c12; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">
                    📜 이전 공지 보기 (최근 5개) ▼
                </button>
            </div>
        </div>

        <div id="notice-list-all" style="display:none; margin-bottom:20px; background:#fffde7; border:1px solid #ffe082; border-radius:10px; padding:10px;">
            <div id="all-notices" style="max-height:200px; overflow-y:auto; font-size:13px;"></div>
        </div>

        <hr>
        <label>📝 전달 내용</label>
        <textarea id="boardText" rows="6" placeholder="내용을 입력하세요"></textarea>
        <div id="boardDraftNotice" class="draft-notice">
            💾 작성하던 메시지가 있어요. <button onclick="restoreBoardDraft()">불러오기</button> <button onclick="clearBoardDraft(true)">버리기</button>
        </div>
        <button class="main-btn" style="background:#1877F2;" onclick="submitBoard()">💬 전송</button>

        <div style="margin-top:30px;">
            <div class="list-header">
                <h3 style="font-size:16px; border-bottom:2px solid #eee; padding-bottom:10px; margin:0; flex:1;">💬 내 문의 현황</h3>
                <button class="refresh-btn" onclick="loadMyBoardPosts()" style="margin-left:10px;">🔄</button>
            </div>
            <div id="my-board-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYJfQD7Jkd9Jecyu27Owy8yGPrwg3tg80",
        authDomain: "logipan-2026.firebaseapp.com",
        projectId: "logipan-2026",
        storageBucket: "logipan-2026.firebasestorage.app",
        messagingSenderId: "650344159406",
        appId: "1:650344159406:web:ff736627926763dae6353f",
        measurementId: "G-GGFVC6P5LE"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "3db15a11410b0c569fb9c8706f7b8d12";

    // [추가] 푸시 알림용 VAPID 키
    const VAPID_KEY = "BJNykZMVNq1d0i8fd0bnHd1dsJgYXOuNDVz9DeneNk9okRbJ7UgJCQeWiOSwWw7CVaJaeaBKaWqFEGM4cX42ZBg";

    // [추가] 로컬 알림 테스트 - Firebase 안 거치고 폰 자체에서 알림 띄우기
    // 알림이 안 올 때 본인 폰 시스템이 정상인지 확인용
    async function testLocalNotification() {
        if (Notification.permission !== 'granted') {
            alert("먼저 🔔 알림 켜기 버튼을 눌러주세요!");
            return;
        }
        try {
            const reg = await navigator.serviceWorker.getRegistration();
            if (reg) {
                await reg.showNotification("🧪 테스트 알림", {
                    body: "이 알림이 보이면 폰 알림은 정상이에요!",
                    icon: 'https://ghwkdwjd-debug.github.io/logipan-report/icon.png',
                    tag: 'test-' + Date.now(),
                    requireInteraction: false
                });
                showToast("🧪 알림 발송됨 - 알림 센터 확인");
            } else {
                new Notification("🧪 테스트 알림", {
                    body: "이게 보이면 알림 정상"
                });
                showToast("🧪 알림 발송됨");
            }
        } catch (e) {
            alert("로컬 알림 실패: " + e.message);
        }
    }

    // [추가] FCM (메시징) 객체 - 브라우저 지원 시에만 초기화
    let messaging = null;
    try {
        if (firebase.messaging.isSupported()) {
            messaging = firebase.messaging();
        }
    } catch (e) {
        console.warn("FCM 미지원 브라우저:", e);
    }

    const DRAFT_REPORT_KEY = "logipan_draft_report";
    const DRAFT_BOARD_KEY = "logipan_draft_board";
    const LAST_SEEN_REPORT_KEY = "logipan_last_seen_report";
    const LAST_SEEN_BOARD_KEY = "logipan_last_seen_board";

    function switchTab(type) {
        document.getElementById('section-report').style.display = type === 'report' ? 'block' : 'none';
        document.getElementById('section-board').style.display = type === 'board' ? 'block' : 'none';
        document.getElementById('tab-report').className = 'tab-btn' + (type === 'report' ? ' active' : '');
        document.getElementById('tab-board').className = 'tab-btn' + (type === 'board' ? ' active' : '');
        if (type === 'board') {
            localStorage.setItem(LAST_SEEN_BOARD_KEY, Date.now().toString());
            document.getElementById('dot-board').style.display = 'none';
            loadNotice();
            loadMyBoardPosts();
        } else {
            localStorage.setItem(LAST_SEEN_REPORT_KEY, Date.now().toString());
            document.getElementById('dot-report').style.display = 'none';
        }
    }

    function askName() {
        const name = prompt("성함을 입력해주세요");
        if (name) { localStorage.setItem("logipan_user_name", name); location.reload(); }
    }

    window.onload = function() {
        console.log("%c🚀 로지판 v2.3 로드됨 (푸시 알림 - 버튼 방식)", "color: #1a73e8; font-size: 14px; font-weight: bold;");
        const name = localStorage.getItem("logipan_user_name");
        if (!name) askName();
        else {
            document.getElementById("userName").value = name;
            document.getElementById("userDisplay").innerText = "👤 작업자: " + name + " (변경)";
            loadActiveReports();
            loadNotice();
            loadMyBoardPosts();
            checkDrafts();
            // [수정] 자동 권한요청 제거 → 알림 버튼 상태만 체크
            updateNotifButton();
        }
        document.getElementById('reportText').addEventListener('input', autosaveReport);
        document.getElementById('reportTitle').addEventListener('input', autosaveReport);
        document.getElementById('boardText').addEventListener('input', autosaveBoard);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    };

    // ---------- [추가] 푸시 알림 ----------
    // 알림 버튼 상태 업데이트
    function updateNotifButton() {
        const btn = document.getElementById('notifBtn');
        if (!btn) return;
        if (!messaging) {
            btn.style.display = 'none';
            return;
        }
        const perm = Notification.permission;
        if (perm === 'granted') {
            btn.innerText = '🔔 알림 ON';
            btn.style.background = '#34a853';
        } else if (perm === 'denied') {
            btn.innerText = '🔕 알림 차단됨';
            btn.style.background = '#999';
        } else {
            btn.innerText = '🔔 알림 켜기';
            btn.style.background = '#fbbc04';
        }
    }

    // 사용자가 버튼 클릭하면 권한 요청 + 토큰 발급
    async function enableNotifications() {
        const userName = localStorage.getItem("logipan_user_name");
        if (!userName) {
            alert("먼저 작업자 이름을 등록해주세요");
            return;
        }
        if (!messaging) {
            alert("⚠️ 이 브라우저는 푸시 알림을 지원하지 않습니다.\n\n아이폰: 사파리에서 '홈 화면에 추가' 후 그 어플로 들어와주세요.\n안드로이드: 크롬 사용 권장");
            return;
        }

        try {
            // 권한 요청
            const permission = await Notification.requestPermission();
            if (permission === 'denied') {
                alert("🔕 알림이 차단되었습니다.\n\n폰 설정에서 직접 허용해주세요:\n[설정] → [알림] → [로지판]");
                updateNotifButton();
                return;
            }
            if (permission !== 'granted') {
                updateNotifButton();
                return;
            }

            // 기존 서비스워커 모두 해제 (깨끗한 상태로)
            const allRegs = await navigator.serviceWorker.getRegistrations();
            for (const reg of allRegs) {
                await reg.unregister();
            }

            // 새 FCM 서비스워커 등록
            const swRegistration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
            await navigator.serviceWorker.ready;

            // 기존 토큰 삭제 후 새 토큰 발급
            try {
                await messaging.deleteToken();
            } catch (e) {}

            const token = await messaging.getToken({
                vapidKey: VAPID_KEY,
                serviceWorkerRegistration: swRegistration
            });
            if (!token) {
                alert("토큰 발급 실패. 다시 시도해주세요.");
                return;
            }
            console.log("✅ FCM 토큰:", token.substring(0, 30) + "...");

            // Firestore 저장
            await db.collection("fcm_tokens").doc(userName).set({
                token: token,
                user: userName,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                userAgent: navigator.userAgent
            });

            // 포그라운드 메시지 수신
            messaging.onMessage(payload => {
                console.log("📨 메시지:", payload);
                const title = payload.data?.title || payload.notification?.title || "새 알림";
                const body = payload.data?.body || payload.notification?.body || "";
                showToast(`🔔 ${title}: ${body}`);
                if (Notification.permission === 'granted' && swRegistration) {
                    swRegistration.showNotification(title, {
                        body: body,
                        icon: 'https://ghwkdwjd-debug.github.io/logipan-report/icon.png',
                        tag: 'logipan-fg-' + Date.now()
                    });
                }
            });

            updateNotifButton();
            showToast("✅ 알림이 켜졌습니다!");
        } catch (e) {
            console.error("알림 설정 실패:", e);
            alert("알림 설정 실패: " + (e.message || e));
        }
    }

    function autosaveReport() {
        const data = { title: document.getElementById('reportTitle').value, text: document.getElementById('reportText').value };
        if (!data.title && !data.text) { localStorage.removeItem(DRAFT_REPORT_KEY); return; }
        localStorage.setItem(DRAFT_REPORT_KEY, JSON.stringify(data));
    }
    function autosaveBoard() {
        const text = document.getElementById('boardText').value;
        if (!text) { localStorage.removeItem(DRAFT_BOARD_KEY); return; }
        localStorage.setItem(DRAFT_BOARD_KEY, text);
    }
    function checkDrafts() {
        const r = localStorage.getItem(DRAFT_REPORT_KEY);
        if (r) { try { const parsed = JSON.parse(r); if (parsed.title || parsed.text) document.getElementById('reportDraftNotice').style.display = 'block'; } catch(e) {} }
        const b = localStorage.getItem(DRAFT_BOARD_KEY);
        if (b) document.getElementById('boardDraftNotice').style.display = 'block';
    }
    function restoreReportDraft() {
        const r = localStorage.getItem(DRAFT_REPORT_KEY);
        if (!r) return;
        try { const parsed = JSON.parse(r); document.getElementById('reportTitle').value = parsed.title || ''; document.getElementById('reportText').value = parsed.text || ''; document.getElementById('reportDraftNotice').style.display = 'none'; } catch(e) {}
    }
    function restoreBoardDraft() {

    let selectedFiles = [];
    function updatePhotoPreview() {

        for (let i = 0; i < input.files.length; i++) selectedFiles.push(input.files[i]);
        renderPhotoPreview();

    function renderPhotoPreview() {

        selectedFiles.forEach((file, idx) => {

            reader.onload = e => {

    function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').style.display = 'flex'; }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.getElementById('lightbox-img').src = ''; }

    function loadNotice() {
        const currentWorker = localStorage.getItem("logipan_user_name");
        db.collection("board_posts")
        .where("receiver", "in", ["all", currentWorker])
        .orderBy("timestamp", "desc")
        .limit(20)
        .onSnapshot(snap => {
            const box = document.getElementById("notice-content");
            let shown = false;
            snap.forEach(doc => {
                if (shown) return;
                const d = doc.data();
                // [수정] '공지' 카테고리만 표시 (개인지시/문의/기타는 제외)
                if (d.category !== "공지") return;
                if (d.status && (d.status.includes("완료") || d.status.includes("확인완료"))) return;
                const sender = d.real_sender || d.user || "관리자";
                const fullText = `📢 ${d.text}\n— ${sender}`;
                box.innerHTML = '';
                const txtDiv = document.createElement('div');
                txtDiv.className = 'notice-text-collapsed';
                txtDiv.innerText = fullText;
                box.appendChild(txtDiv);
                setTimeout(() => {
                    if (txtDiv.scrollHeight > txtDiv.clientHeight + 2) {
                        const btn = document.createElement('button');
                        btn.className = 'notice-toggle-btn';
                        btn.innerText = '...더보기 ▼';
                        btn.onclick = () => { const collapsed = txtDiv.classList.toggle('notice-text-collapsed'); btn.innerText = collapsed ? '...더보기 ▼' : '▲ 접기'; };
                        if (!box.querySelector('.notice-toggle-btn')) box.appendChild(btn);
                    }
                }, 50);
                shown = true;
            });
            if (!shown) box.innerText = "현재 등록된 공지가 없습니다.";
        });
    }

    let myPostsListener = null;
    function loadMyBoardPosts() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) return;
        if (myPostsListener) myPostsListener();
        myPostsListener = db.collection("board_posts")
          .where("user", "==", name)
          .onSnapshot(snap => {
              const listDiv = document.getElementById("my-board-list");
              unsubscribeAllBoardMessages();
              listDiv.innerHTML = "";
              if (snap.empty) { listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center;'>문의 내역이 없습니다.</p>"; return; }
              let docs = [];
              snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
              docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
              let renderedCount = 0;
              docs.forEach(d => {
                if (d.category === "공지") return;
                if (d.status && d.status.includes("완료")) return;
                const item = document.createElement("div");
                item.className = "report-item";
                item.id = `bpost-${d.id}`;
                let badgeClass = 'wait';
                let badgeText = d.status || '신규';
                if (d.status && d.status.includes('대화')) { badgeClass = 'talking'; badgeText = '💬 대화중'; }
                else if (d.status && d.status.includes('확인')) { badgeClass = 'done'; badgeText = '✅ 확인'; }
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-weight:bold; color:#555;">💬 내 메시지</span>
                        <div>
                            <span class="status-badge ${badgeClass}" style="margin:0;">${badgeText}</span>
                            ${(!d.reply && (!d.status || !d.status.includes('대화'))) ? `<button onclick="deleteMyPost('${d.id}')" style="margin-left:8px; border:none; background:none; color:#ff4d4f; cursor:pointer; font-size:12px;">삭제</button>` : ''}
                        </div>
                    </div>
                    <div style="font-size:14px; margin-bottom:5px; line-height:1.4; white-space: pre-wrap;">${escapeHtml(d.text)}</div>
                `;
                if (d.reply) {
                    const replyFrom = d.reply_sender || "관리자";
                    html += `<div class="reply-box"><b style="color:#1877f2; font-size:11px;">📢 ${escapeHtml(replyFrom)} 답변</b><br>${escapeHtml(d.reply)}</div>`;
                }
                html += `
                    <button onclick="toggleBoardThread('${d.id}')" style="background:none;border:none;color:#1a73e8;font-size:13px;font-weight:bold;margin-top:10px;display:block; padding:0;">
                        💬 대화 보기 <span id="bcount-${d.id}">(...)</span><span id="bnew-${d.id}"></span>
                    </button>
                    <div id="bsec-${d.id}" class="comment-section">
                        <div id="bcomments-${d.id}"></div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="binput-${d.id}" placeholder="답장 입력" style="flex:1; padding:8px; font-size:13px;">
                            <button onclick="sendBoardReply('${d.id}')" style="background:#1a73e8; color:white; border:none; border-radius:6px; padding:0 12px; font-weight:bold;">전송</button>
                        </div>
                    </div>
                `;
                item.innerHTML = html;
                listDiv.appendChild(item);
                renderedCount++;
                subscribeBoardMessages(d.id);
            });
            if (renderedCount === 0) listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center;'>표시할 문의 내역이 없습니다.</p>";
          }, err => { console.error("데이터 불러오기 오류:", err); });
    }

    let boardMsgListeners = {};
    function unsubscribeAllBoardMessages() {
        Object.values(boardMsgListeners).forEach(unsub => { try { unsub(); } catch (e) {} });
        boardMsgListeners = {};
    }
    function subscribeBoardMessages(docId) {
        if (boardMsgListeners[docId]) { try { boardMsgListeners[docId](); } catch (e) {} delete boardMsgListeners[docId]; }
        const initialBox = document.getElementById(`bcomments-${docId}`);
        if (initialBox) initialBox.innerHTML = "<p style='color:#aaa; font-size:12px; text-align:center; padding:8px;'>대화 연결 중... ⏳</p>";
        const timeoutHandle = setTimeout(() => {
            const box = document.getElementById(`bcomments-${docId}`);
            if (box && box.innerText.includes("연결 중")) box.innerHTML = "<p style='color:#c00; font-size:12px; padding:8px;'>⚠️ 응답이 늦어요. 새로고침 해주세요.</p>";
        }, 3000);
        boardMsgListeners[docId] = db.collection("board_posts").doc(docId).collection("messages").orderBy("timestamp", "asc").onSnapshot(snap => {
            clearTimeout(timeoutHandle);
            const box = document.getElementById(`bcomments-${docId}`);
            const countTag = document.getElementById(`bcount-${docId}`);
            const newBadge = document.getElementById(`bnew-${docId}`);
            const itemEl = document.getElementById(`bpost-${docId}`);
            if (!box) return;
            if (snap.empty) { box.innerHTML = "<p style='color:#999; font-size:12px; text-align:center; padding:8px 0;'>아직 답장이 없어요.</p>"; if (countTag) countTag.innerText = "(0)"; return; }
            if (countTag) countTag.innerText = `(${snap.size})`;
            box.innerHTML = "";
            let lastIsAdmin = false;
            let hasNewAdminReply = false;
            const lastSeen = parseInt(localStorage.getItem(LAST_SEEN_BOARD_KEY) || '0');
            snap.forEach(c => {
                const md = c.data();
                const role = md.role || (md.sender === '관리자' ? 'admin' : 'worker');
                const isAdmin = role === 'admin';
                lastIsAdmin = isAdmin;
                const ts = md.timestamp;
                const tsMillis = ts ? ts.seconds * 1000 : 0;
                if (isAdmin && tsMillis > lastSeen) hasNewAdminReply = true;
                const timeStr = ts ? new Date(tsMillis).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const bubble = document.createElement("div");
                bubble.className = `comment-bubble ${isAdmin ? 'admin-msg' : 'user-msg'}`;
                bubble.innerHTML = `<span style="font-size:11px; font-weight:bold; color:${isAdmin?'#1a73e8':'#555'}">${isAdmin ? '📢 ' : '👤 '}${escapeHtml(md.sender || '?')}</span><span style="font-size:10px; color:#999; margin-left:6px;">${timeStr}</span><br>${escapeHtml(md.text || '')}`;
                box.appendChild(bubble);
            });
            if (newBadge) newBadge.innerHTML = (lastIsAdmin && hasNewAdminReply) ? '<span class="new-badge">NEW</span>' : '';
            if (itemEl) { if (hasNewAdminReply) itemEl.classList.add('has-new'); else itemEl.classList.remove('has-new'); }
            if (hasNewAdminReply && document.getElementById('section-board').style.display === 'none') document.getElementById('dot-board').style.display = 'block';
        }, err => {
            clearTimeout(timeoutHandle);
            const box = document.getElementById(`bcomments-${docId}`);
            if (box) box.innerHTML = `<p style='color:#c00; font-size:12px; padding:8px;'>⚠️ ${escapeHtml(err.message || '오류')}</p>`;
        });
    }

    function toggleBoardThread(docId) {
        const sec = document.getElementById(`bsec-${docId}`);
        const newOpen = sec.style.display !== "block";
        sec.style.display = newOpen ? "block" : "none";
        if (newOpen) {
            localStorage.setItem(LAST_SEEN_BOARD_KEY, Date.now().toString());
            document.getElementById('dot-board').style.display = 'none';
            const itemEl = document.getElementById(`bpost-${docId}`);
            if (itemEl) itemEl.classList.remove('has-new');
            const newBadge = document.getElementById(`bnew-${docId}`);
            if (newBadge) newBadge.innerHTML = '';
        }
    }

    async function sendBoardReply(docId) {
        const input = document.getElementById(`binput-${docId}`);
        const name = document.getElementById('userName').value;
        if (!input.value.trim()) return;
        try {
            await db.collection("board_posts").doc(docId).collection("messages").add({
                sender: name, role: "worker", text: input.value.trim(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("board_posts").doc(docId).update({ status: "💬 대화중" });
            input.value = "";
        } catch (e) { alert("답장 전송 실패: " + e.message); }
    }

    async function submitBoard() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('boardText').value.trim();
        if (!text) return alert("내용을 입력해주세요!");
        const loading = document.getElementById('loading');
        document.getElementById('loadingMsg').innerText = "메시지 전송 중...";
        document.getElementById('loading-progress').style.display = 'none';
        loading.style.display = "block";
        try {
            await db.collection("board_posts").add({
                user: name, real_sender: name, category: "문의", receiver: "all",
                text: text, status: "신규", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('boardText').value = "";
            clearBoardDraft(true);
            showToast("✅ 메시지가 전송되었습니다!");
        } catch(e) { alert("오류: " + e.message); }
        loading.style.display = "none";
    }

    function showToast(msg) {
        const div = document.createElement('div');
        div.innerText = msg;
        div.style.cssText = `position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: #323232; color: white; padding: 12px 24px; border-radius: 25px; font-size: 14px; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.3);`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    let noticeStep = 0;
    function handleNoticeStep(targetStep) {
        const listDiv = document.getElementById("notice-list-all");
        if (targetStep === 0) { noticeStep = 0; listDiv.style.display = "none"; renderNoticeButtons(); return; }
        noticeStep = targetStep;
        listDiv.style.display = "block";
        renderNoticeButtons();
        loadNoticesByStep(noticeStep === 1 ? 5 : '7days');
    }
    function renderNoticeButtons() {
        const btnContainer = document.getElementById("notice-btn-container");
        if (!btnContainer) return;
        if (noticeStep === 0) {
            btnContainer.innerHTML = `<button id="notice-step-btn" onclick="handleNoticeStep(1)" style="background:none; border:none; color:#f39c12; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">📜 이전 공지 보기 (최근 5개) ▼</button>`;
        } else if (noticeStep === 1) {
            btnContainer.innerHTML = `<button onclick="handleNoticeStep(2)" style="background:none; border:none; color:#f39c12; font-size:12px; font-weight:bold; cursor:pointer; padding:0; margin-right:15px;">📅 최근 7일 내역 더보기 ▼</button><button onclick="handleNoticeStep(0)" style="background:none; border:none; color:#999; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">▲ 접기</button>`;
        } else if (noticeStep === 2) {
            btnContainer.innerHTML = `<button onclick="handleNoticeStep(0)" style="background:none; border:none; color:#999; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">▲ 모든 공지 리스트 접기</button>`;
        }
    }
    function loadNoticesByStep(mode) {
        const container = document.getElementById("all-notices");
        let query = db.collection("board_posts").where("category", "==", "공지").orderBy("timestamp", "desc");
        if (mode === 5) query = query.limit(5);
        else if (mode === '7days') {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            query = query.where("timestamp", ">=", sevenDaysAgo);
        }
        query.get().then(snap => {
            container.innerHTML = "";
            if (snap.empty) { container.innerHTML = "<p style='color:#999; text-align:center; padding:10px;'>해당하는 공지가 없습니다.</p>"; return; }
            let renderedCount = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if (d.status && d.status.includes("완료")) return;
                const date = d.timestamp ? new Date(d.timestamp.seconds * 1000).toLocaleDateString() : "날짜미상";
                const sender = d.real_sender || d.user || "관리자";
                const item = document.createElement("div");
                item.style = "padding:12px 0; border-bottom:1px solid #eee;";
                item.innerHTML = `<div style="font-size:11px; color:#f39c12; font-weight:bold; margin-bottom:4px;">📌 ${date} · ${escapeHtml(sender)}</div><div style="color:#444; line-height:1.5; white-space: pre-wrap; font-size:13px;">${escapeHtml(d.text)}</div>`;
                container.appendChild(item);
                renderedCount++;
            });
            if (renderedCount === 0) container.innerHTML = "<p style='color:#999; text-align:center; padding:10px;'>해당하는 공지가 없습니다.</p>";
        });
    }

    let reportListener = null;
    function getFormattedDate() {
        const now = new Date();
        return `${String(now.getFullYear()).slice(-2)}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
    }
    function loadActiveReports() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) return;
        document.getElementById("listTitle").innerText = "⏳ 현재 진행 중인 작업";
        if (reportListener) reportListener();
        reportListener = db.collection("field_reports").where("user", "==", name).where("status", "==", "⏳ 처리중").onSnapshot(snap => { renderList(snap); });
    }
    async function searchReports() {
        const name = localStorage.getItem("logipan_user_name");
        let keyword = document.getElementById("searchKeyword").value.trim();
        if (!keyword) { loadActiveReports(); return; }
        if (reportListener) reportListener();
        document.getElementById("listTitle").innerText = `🔍 '${keyword}' 검색 결과 (완료 포함)`;
        if (keyword.length === 6 && !isNaN(keyword)) keyword = `${keyword.slice(0,2)}/${keyword.slice(2,4)}/${keyword.slice(4,6)}`;
        const snap = await db.collection("field_reports").where("user", "==", name).get();
        renderList(snap, keyword);
    }
    function renderList(snap, kw = null) {
        const listDiv = document.getElementById("reportList");
        listDiv.innerHTML = "";
        let docs = [];
        snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
        docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        docs.forEach(data => {
            if (kw && !((data.date||'') + (data.title||'') + (data.text||'')).toLowerCase().includes(kw.toLowerCase())) return;
            const isDone = data.status === "✅ 완료";
            const imgUrls = data.imageUrl ? data.imageUrl.split(",").filter(u => u.trim()) : [];
            const item = document.createElement("div");
            item.className = `report-item ${isDone ? 'done' : ''}`;
            item.id = `rpost-${data.id}`;
            let photosHtml = '';
            if (imgUrls.length > 0) {
                photosHtml = '<div class="attached-photos">';
                imgUrls.forEach(url => { const safeUrl = url.replace(/"/g, '&quot;'); photosHtml += `<img src="${safeUrl}" onclick="openLightbox('${safeUrl}')" loading="lazy">`; });
                photosHtml += '</div>';
            }
            item.innerHTML = `
                <div class="status-badge ${isDone ? 'done' : 'wait'}">${escapeHtml(data.status || '')}</div>
                <div style="font-weight:bold; font-size:15px;">${escapeHtml(data.title || '')}</div>
                <div style="font-size:13px; color:#666; margin-top:5px; white-space:pre-wrap;">${escapeHtml(data.text || '')}</div>
                ${photosHtml}
                <button onclick="toggleComments('${data.id}')" style="background:none;border:none;color:#1a73e8;font-size:13px;font-weight:bold;margin-top:10px;display:block; padding:0;">
                    💬 대화 보기 <span id="count-${data.id}">(...)</span><span id="new-${data.id}"></span>
                </button>
                <div id="sec-${data.id}" class="comment-section">
                    <div id="comments-${data.id}"></div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="input-${data.id}" placeholder="답장 입력" style="flex:1; padding:8px; font-size:13px;">
                        <button onclick="sendReply('${data.id}')" style="background:#1a73e8; color:white; border:none; border-radius:6px; padding:0 12px; font-weight:bold;">전송</button>
                    </div>
                </div>
            `;
            listDiv.appendChild(item);
            loadComments(data.id);
        });
        if (docs.length === 0) listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center; padding:20px 0;'>표시할 작업이 없습니다.</p>";
    }

    function loadComments(docId) {
        db.collection("field_reports").doc(docId).collection("comments").orderBy("timestamp", "asc").onSnapshot(snap => {
            const box = document.getElementById(`comments-${docId}`);
            const countTag = document.getElementById(`count-${docId}`);
            const newBadge = document.getElementById(`new-${docId}`);
            const itemEl = document.getElementById(`rpost-${docId}`);
            if (!box) return;
            const myName = localStorage.getItem("logipan_user_name") || "";
            if (snap.empty) { box.innerHTML = "대화 없음"; if (countTag) countTag.innerText = "(0)"; return; }
            if (countTag) countTag.innerText = `(${snap.size})`;
            box.innerHTML = "";
            let lastIsAdmin = false;
            let hasNewAdminReply = false;
            const lastSeen = parseInt(localStorage.getItem(LAST_SEEN_REPORT_KEY) || '0');
            snap.forEach(c => {
                const d = c.data();
                const text = d.text || '';
                const userName = d.user || '';
                const explicitRole = d.role;
                let isAdmin;
                if (explicitRole === 'admin') isAdmin = true;
                else if (explicitRole === 'worker') isAdmin = false;
                else if (text.startsWith('[답장]') && userName === myName) isAdmin = false;
                else isAdmin = true;
                lastIsAdmin = isAdmin;
                const ts = d.timestamp;
                const tsMillis = ts ? ts.seconds * 1000 : 0;
                if (isAdmin && tsMillis > lastSeen) hasNewAdminReply = true;
                const timeStr = ts ? new Date(tsMillis).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const displayName = userName || (isAdmin ? '관리자' : '나');
                const cleanText = text.replace(/^\[답장\]\s*/, '');
                const bubble = document.createElement("div");
                bubble.className = `comment-bubble ${isAdmin ? 'admin-msg' : 'user-msg'}`;
                bubble.innerHTML = `<span style="font-size:11px; font-weight:bold; color:${isAdmin?'#1a73e8':'#555'}">${isAdmin ? '📢 ' : '👤 '}${escapeHtml(displayName)}</span><span style="font-size:10px; color:#999; margin-left:6px;">${timeStr}</span><br>${escapeHtml(cleanText)}`;
                box.appendChild(bubble);
            });
            if (newBadge) newBadge.innerHTML = (lastIsAdmin && hasNewAdminReply) ? '<span class="new-badge">NEW</span>' : '';
            if (itemEl) { if (hasNewAdminReply) itemEl.classList.add('has-new'); else itemEl.classList.remove('has-new'); }
            if (hasNewAdminReply && document.getElementById('section-report').style.display === 'none') document.getElementById('dot-report').style.display = 'block';
        });
    }

    async function uploadAndSend() {
        const name = document.getElementById('userName').value;
        const title = document.getElementById('reportTitle').value.trim();
        const text = document.getElementById('reportText').value.trim();
        if (!title || !text) return alert("제목과 내용을 입력해주세요!");
        const loading = document.getElementById('loading');
        const progressBox = document.getElementById('loading-progress');
        const progressBar = document.getElementById('loading-progress-bar');
        const msg = document.getElementById('loadingMsg');
        loading.style.display = "block";
        let imageUrls = [];
        try {
            const total = selectedFiles.length;
            if (total > 0) { progressBox.style.display = 'block'; progressBar.style.width = '0%'; }
            else progressBox.style.display = 'none';
            for (let i = 0; i < total; i++) {
                msg.innerText = `사진 업로드 중... (${i+1}/${total})`;
                progressBar.style.width = `${Math.round((i / total) * 100)}%`;
                let formData = new FormData();
                formData.append("image", selectedFiles[i]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if (json.success) imageUrls.push(json.data.url);
            }
            if (total > 0) progressBar.style.width = '100%';
            msg.innerText = "전송 중...";
            await db.collection("field_reports").add({
                user: name, title: title, text: text, date: getFormattedDate(),
                imageUrl: imageUrls.join(","), status: "⏳ 처리중", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('reportTitle').value = '';
            document.getElementById('reportText').value = '';
            selectedFiles = [];
            renderPhotoPreview();
            clearReportDraft(true);
            showToast("✅ 보고가 전송되었습니다!");
        } catch (e) { alert("오류: " + e.message); }
        loading.style.display = "none";
        progressBox.style.display = 'none';
    }

    function toggleComments(docId) {
        const sec = document.getElementById(`sec-${docId}`);
        const newOpen = sec.style.display !== "block";
        sec.style.display = newOpen ? "block" : "none";
        if (newOpen) {
            localStorage.setItem(LAST_SEEN_REPORT_KEY, Date.now().toString());
            document.getElementById('dot-report').style.display = 'none';
            const itemEl = document.getElementById(`rpost-${docId}`);
            if (itemEl) itemEl.classList.remove('has-new');
            const newBadge = document.getElementById(`new-${docId}`);
            if (newBadge) newBadge.innerHTML = '';
        }
    }

    async function sendReply(docId) {
        const input = document.getElementById(`input-${docId}`);
        const name = document.getElementById('userName').value;
        if (!input.value.trim()) return;
        await db.collection("field_reports").doc(docId).collection("comments").add({
            user: name, role: "worker", text: "[답장] " + input.value.trim(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    async function deleteMyPost(docId) {
        if (!confirm("작성하신 메시지를 삭제하시겠습니까?")) return;
        try { await db.collection("board_posts").doc(docId).delete(); showToast("삭제되었습니다."); }
        catch (e) { alert("삭제 중 오류: " + e.message); }
    }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
</script>
