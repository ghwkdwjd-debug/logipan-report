<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로지판 - 통합 현장 관리</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #f4f7f9; margin: 0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 550px; margin: auto; }
        
        /* 탭 메뉴 스타일 */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #eee; color: #666; }
        .tab-btn.active { background: #222; color: white; }

        h2 { text-align: center; font-size: 20px; margin-bottom: 20px; color: #222; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        button.main-btn { width: 100%; padding: 16px; background: #222; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* 공지사항 스타일 */
        .notice-box { background: #fff9c4; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .notice-box small { display: block; color: #7f8c8d; margin-bottom: 5px; font-size: 11px; }

        .search-box { display: flex; gap: 8px; margin-top: 20px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 10px !important; font-size: 13px !important; }
        .search-btn { width: 70px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .report-item { background: #fff; border: 1px solid #eef0f2; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .report-item.done { opacity: 0.8; background: #f9f9f9; border: 1px solid #ddd; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .wait { background: #fff3e0; color: #ef6c00; } 
        .done { background: #e8f5e9; color: #2e7d32; }

        .new-badge { background: #ff4d4f; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .comment-section { display: none; margin-top: 10px; background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 13px; border: 1px solid #eee; }
        .comment-bubble { padding: 8px; border-radius: 6px; margin-bottom: 5px; }
        .admin-msg { background: #e7f3ff; border-left: 4px solid #1a73e8; }
        .user-msg { background: #eee; border-left: 4px solid #999; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); color: white; text-align: center; padding-top: 250px; z-index: 1000; }

        /* 관리자 답변용 파란색 박스 디자인 */
        .reply-box { 
            margin-top: 10px; 
            background: #e7f3ff; 
            padding: 10px; 
            border-radius: 8px; 
            border-left: 4px solid #1877f2; 
            font-size: 13px; 
        }
    </style>
</head>
<body>

<div id="loading">🚀 <span id="loadingMsg">데이터를 처리 중입니다...</span></div>

<div class="card">
    <div class="tabs">
        <button id="tab-report" class="tab-btn active" onclick="switchTab('report')">📷 현장보고</button>
        <button id="tab-board" class="tab-btn" onclick="switchTab('board')">📢 공지/소통</button>
    </div>

    <div id="userDisplay" style="background:#f0f2f5; padding:10px; border-radius:8px; text-align:center; font-weight:bold; margin-bottom:15px; font-size:14px; cursor:pointer;" onclick="askName()">👤 작업자 등록 (클릭)</div>
    <input type="hidden" id="userName">

    <div id="section-report">
        <h2>👷 현장 작업 보고</h2>
        <label>📌 제목</label>
        <input type="text" id="reportTitle" placeholder="예: 브랜드 입고 완료했습니다">
        <label>📸 사진 촬영 / 첨부</label>
        <input type="file" id="photoInput" accept="image/*" multiple>
        <label>📝 상세 내용</label>
        <textarea id="reportText" rows="4" placeholder="상세 내용을 입력하세요"></textarea>
        <button class="main-btn" onclick="uploadAndSend()">🚀 확인요청 보내기</button>
        <hr style="margin-top:25px; border:0; border-top:1px solid #eee;">
        <div class="search-box">
            <input type="text" id="searchKeyword" class="search-input" placeholder="제목 검색 시 완료 된 요청 검색가능">
            <button class="search-btn" onclick="searchReports()">조회</button>
        </div>
        <div id="listTitle" style="font-size:13px; font-weight:bold; color:#666; margin-bottom:10px;">⏳ 현재 진행 중인 작업</div>
        <div id="reportList"></div>
    </div>

    <div id="section-board" style="display:none;">
        <h2>📢 공지사항 및 소통</h2>
        <div class="notice-box">
            <small>최근 공지</small>
            <div id="notice-content">불러오는 중...</div>
        </div>
        <hr>
        <label>📝 전달 내용</label>
        <textarea id="boardText" rows="6" placeholder="내용을 입력하세요"></textarea>
        <button class="main-btn" style="background:#1877F2;" onclick="submitBoard()">💬 전송</button>

        <div style="margin-top:30px;">
            <h3 style="font-size:16px; border-bottom:2px solid #eee; padding-bottom:10px;">💬 내 문의 현황</h3>
            <div id="my-board-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-T0_v6G3_Lp-o2S5k_Jz1E5I", 
        authDomain: "logipan-2026.firebaseapp.com",
        projectId: "logipan-2026",
        storageBucket: "logipan-2026.appspot.com",
        messagingSenderId: "1136785507793",
        appId: "1:1136785507793:web:786543210abcd1234"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMGBB_KEY = "3db15a11410b0c569fb9c8706f7b8d12";

    function switchTab(type) {
        document.getElementById('section-report').style.display = type === 'report' ? 'block' : 'none';
        document.getElementById('section-board').style.display = type === 'board' ? 'block' : 'none';
        document.getElementById('tab-report').className = 'tab-btn' + (type === 'report' ? ' active' : '');
        document.getElementById('tab-board').className = 'tab-btn' + (type === 'board' ? ' active' : '');
        if(type === 'board') { loadNotice(); loadMyBoardPosts(); }
    }

    function askName() {
        const name = prompt("성함을 입력해주세요");
        if (name) { localStorage.setItem("logipan_user_name", name); location.reload(); }
    }

    window.onload = function() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) askName();
        else {
            document.getElementById("userName").value = name;
            document.getElementById("userDisplay").innerText = "👤 작업자: " + name + " (변경)";
            loadActiveReports();
            loadNotice();
            loadMyBoardPosts();
        }
    };

    function loadNotice() {
        db.collection("board_posts").where("category", "==", "공지").orderBy("timestamp", "desc").limit(1).onSnapshot(snap => {
            const box = document.getElementById("notice-content");
            if(snap.empty) box.innerText = "현재 등록된 공지가 없습니다.";
            else snap.forEach(doc => box.innerText = doc.data().text);
        });
    }

    function loadMyBoardPosts() {
    const name = localStorage.getItem("logipan_user_name");
    
    // .orderBy("timestamp", "desc") 이 부분을 잠시 지워보세요 (색인 생성 전까지)
    db.collection("board_posts")
      .where("user", "==", name)
      .onSnapshot(snap => {
          const listDiv = document.getElementById("my-board-list");
          listDiv.innerHTML = "";
          
          if(snap.empty) {
              listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center;'>문의 내역이 없습니다.</p>";
              return;
          }

          // 데이터를 시간순으로 수동 정렬 (색인 오류 방지)
          let docs = [];
          snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
          docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

          docs.forEach(d => {
            if(d.category === "공지") return;
            
            const item = document.createElement("div");
            item.className = "report-item";
            item.style.border = "1px solid #ddd";

            // 삭제 버튼 추가 (상태가 '신규'일 때만 보이게 하거나, 항상 보이게 할 수 있음)
            // 여기서는 '신규'일 때만 삭제 버튼이 작동하도록 로직을 짭니다.
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-weight:bold; color:#555;">💬 내 메시지</span>
                    <div>
                        <span class="status-badge ${d.status && d.status.includes('확인')?'done':'wait'}" style="margin:0;">${d.status || '신규'}</span>
                        ${!d.reply ? `<button onclick="deleteMyPost('${d.id}')" style="margin-left:8px; border:none; background:none; color:#ff4d4f; cursor:pointer; font-size:12px;">삭제</button>` : ''}
                    </div>
                </div>
                <div style="font-size:14px; margin-bottom:5px; line-height:1.4;">${d.text}</div>
            `;

            if(d.reply) {
                html += `
                    <div class="reply-box">
                        <b style="color:#1877f2; font-size:11px;">📢 관리자 답변</b><br>
                        ${d.reply}
                    </div>
                `;
            }

            item.innerHTML = html;
            listDiv.appendChild(item);
        });
      }, err => {
          console.error("데이터 불러오기 오류:", err);
          // 여기서 "The query requires an index." 라는 메시지가 뜨면 링크를 클릭해서 색인을 만들어야 합니다.
      });
}

    async function submitBoard() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('boardText').value;
        if(!text) return alert("내용을 입력해주세요!");

        const loading = document.getElementById('loading');
        loading.style.display = "block";
        try {
            await db.collection("board_posts").add({
                user: name,
                category: "문의",
                text: text,
                status: "신규",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("메시지가 전송되었습니다!");
            document.getElementById('boardText').value = "";
        } catch(e) { alert("오류: " + e.message); }
        loading.style.display = "none";
    }

    /* --- 여기서부터 현장보고 로직 (수정 금지 영역) --- */
    let reportListener = null;
    function getFormattedDate() {
        const now = new Date();
        return `${String(now.getFullYear()).slice(-2)}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
    }

    function loadActiveReports() {
        const name = localStorage.getItem("logipan_user_name");
        if(reportListener) reportListener();
        reportListener = db.collection("field_reports").where("user", "==", name).where("status", "==", "⏳ 처리중").onSnapshot(snap => renderList(snap));
    }

    async function searchReports() {
        const name = localStorage.getItem("logipan_user_name");
        let kw = document.getElementById("searchKeyword").value.trim();
        if (!kw) { loadActiveReports(); return; }
        if(reportListener) reportListener();
        if (kw.length === 6 && !isNaN(kw)) kw = `${kw.slice(0,2)}/${kw.slice(2,4)}/${kw.slice(4,6)}`;
        const snap = await db.collection("field_reports").where("user", "==", name).get();
        renderList(snap, kw);
    }

    function renderList(snap, kw = null) {
        const listDiv = document.getElementById("reportList");
        listDiv.innerHTML = "";
        let docs = [];
        snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
        docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        docs.forEach(data => {
            if (kw && !(data.date + data.title + data.text).toLowerCase().includes(kw.toLowerCase())) return;
            const isDone = data.status === "✅ 완료";
            const imgCount = data.imageUrl ? data.imageUrl.split(",").length : 0;
            const item = document.createElement("div");
            item.className = `report-item ${isDone ? 'done' : ''}`;
            item.innerHTML = `
                <div class="status-badge ${isDone ? 'done' : 'wait'}">${data.status}</div>
                <div style="font-weight:bold; font-size:15px;">${data.title}</div>
                <div style="font-size:13px; color:#666; margin-top:5px;">${data.text}</div>
                ${imgCount > 0 ? `<div style="font-size:12px; color:#1a73e8; margin-top:5px;">🖼️ 사진 ${imgCount}장 첨부됨</div>` : ''}
                <button onclick="toggleComments('${data.id}')" style="background:none;border:none;color:#1a73e8;font-size:13px;font-weight:bold;margin-top:10px;display:block;">
                    💬 대화 보기 <span id="count-${data.id}"></span><span id="new-${data.id}"></span>
                </button>
                <div id="sec-${data.id}" class="comment-section">
                    <div id="comments-${data.id}">불러오는 중...</div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <input type="text" id="input-${data.id}" placeholder="답장 입력" style="flex:1; padding:8px; font-size:13px;">
                        <button onclick="sendReply('${data.id}')" style="background:#1a73e8; color:white; border:none; border-radius:6px; padding:0 10px;">전송</button>
                    </div>
                </div>
            `;
            listDiv.appendChild(item);
            loadComments(data.id);
        });
    }

    function loadComments(docId) {
        db.collection("field_reports").doc(docId).collection("comments").orderBy("timestamp", "asc").onSnapshot(snap => {
            const box = document.getElementById(`comments-${docId}`);
            const countTag = document.getElementById(`count-${docId}`);
            const newBadge = document.getElementById(`new-${docId}`);
            if (snap.empty) { box.innerHTML = "대화 없음"; countTag.innerText = "(0)"; return; }
            countTag.innerText = `(${snap.size})`;
            box.innerHTML = "";
            let lastIsAdmin = false;
            snap.forEach(c => {
                const d = c.data();
                const isAdmin = !d.text.includes("[답장]"); 
                lastIsAdmin = isAdmin;
                const bubble = document.createElement("div");
                bubble.className = `comment-bubble ${isAdmin ? 'admin-msg' : 'user-msg'}`;
                bubble.innerHTML = `<span style="font-size:11px; font-weight:bold; color:${isAdmin?'#1a73e8':'#555'}">${isAdmin?'📢 '+d.user:'👤 '+d.user}</span><br>${d.text.replace("[답장] ", "")}`;
                box.appendChild(bubble);
            });
            if(newBadge) newBadge.innerHTML = lastIsAdmin ? '<span class="new-badge">NEW</span>' : '';
        });
    }

    async function uploadAndSend() {
        const name = document.getElementById('userName').value;
        const title = document.getElementById('reportTitle').value;
        const text = document.getElementById('reportText').value;
        const files = document.getElementById('photoInput').files;
        if(!title || !text) return alert("제목과 내용을 입력해주세요!");

        const loading = document.getElementById('loading');
        loading.style.display = "block";
        let imageUrls = []; 
        try {
            for (let i = 0; i < files.length; i++) {
                let formData = new FormData();
                formData.append("image", files[i]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if(json.success) imageUrls.push(json.data.url);
            }
            await db.collection("field_reports").add({
                user: name, title: title, text: text, date: getFormattedDate(), 
                imageUrl: imageUrls.join(","), status: "⏳ 처리중", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("전송 완료!"); location.reload();
        } catch (e) { alert("오류: " + e.message); }
        loading.style.display = "none";
    }

    function toggleComments(docId) {
        const sec = document.getElementById(`sec-${docId}`);
        sec.style.display = sec.style.display === "block" ? "none" : "block";
    }

    async function sendReply(docId) {
        const input = document.getElementById(`input-${docId}`);
        const name = document.getElementById('userName').value;
        if (!input.value) return;
        await db.collection("field_reports").doc(docId).collection("comments").add({
            user: name, text: "[답장] " + input.value, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    // 내 글 삭제 함수
    async function deleteMyPost(docId) {
        if(!confirm("작성하신 메시지를 삭제하시겠습니까?")) return;
        
        try {
            await db.collection("board_posts").doc(docId).delete();
            alert("삭제되었습니다.");
        } catch (e) {
            alert("삭제 중 오류가 발생했습니다: " + e.message);
        }
    }
</script>
</body>
</html>
