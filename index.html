    async function startCameraInModal() {
        const engineInfo = document.getElementById('camera-engine-info');
        try {
            // <video> 생성
            videoEl = document.getElementById('scan-video');
            if (!videoEl) {
                videoEl = document.createElement('video');
                videoEl.id = 'scan-video';
                videoEl.setAttribute('playsinline', 'true');
                videoEl.setAttribute('autoplay', 'true');
                videoEl.muted = true;
                videoEl.style.width = '100%';
                videoEl.style.height = '100%';
                videoEl.style.objectFit = 'cover';
                document.getElementById('scan-reader').appendChild(videoEl);
            }

            // 카메라 권한 + 스트림 - 최대 해상도 요청
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1920, min: 1280 },
                    height: { ideal: 1080, min: 720 },
                    frameRate: { ideal: 30 }
                },
                audio: false
            };

            cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
            videoEl.srcObject = cameraStream;
            await videoEl.play();

            // 비디오 트랙 정보 + 줌 적용 시도
            const track = cameraStream.getVideoTracks()[0];
            let zoomApplied = '';
            cameraTrack = track;  // 줌 버튼 등에서 사용
            try {
                if (track.getCapabilities) {
                    const caps = track.getCapabilities();
                    const advanced = [];
                    // 연속 자동 초점
                    if (caps.focusMode && caps.focusMode.includes('continuous')) {
                        advanced.push({ focusMode: 'continuous' });
                    }
                    // [패치] 줌 기본값 1.0x - 19자리 바코드 다 들어오게
                    // 작업자가 필요하면 + 버튼으로 확대
                    if (caps.zoom) {
                        cameraZoomCaps = caps.zoom;
                        currentZoom = Math.max(caps.zoom.min, 1.0);
                        advanced.push({ zoom: currentZoom });
                        zoomApplied = ` z${currentZoom}x`;
                        // 줌 버튼 표시
                        const zoomUI = document.getElementById('zoom-control');
                        if (zoomUI) zoomUI.style.display = 'flex';
                        updateZoomUI();
                    } else {
                        // 줌 미지원이면 UI 숨김
                        const zoomUI = document.getElementById('zoom-control');
                        if (zoomUI) zoomUI.style.display = 'none';
                    }
                    if (advanced.length > 0) {
                        await track.applyConstraints({ advanced });
                    }
                }
            } catch (e) {
                console.warn("카메라 capability 적용 일부 실패:", e);
            }

            // 비디오 실제 해상도
            const settings = track.getSettings ? track.getSettings() : {};
            const realW = settings.width || 'unknown';
            const realH = settings.height || 'unknown';

            // ─── 디코더 동시 가동 ─────────────
            // 메인: ZBar WASM (1D 최강) + zxing-wasm (C++) - 둘 다 전처리 적용
            // 백업: Quagga (1D 보조), ZXing JS (QR/2D 보조)
            // OCR: 바코드 안 잡힐 때 텍스트로 우회 (1초에 1번, 보조)
            startZbarDetector(videoEl, realW, realH, zoomApplied);
            startZxingWasmDetector(videoEl, realW, realH, zoomApplied);
            startQuaggaDetector(videoEl, realW, realH, zoomApplied);
            startZxingBackupDetector(videoEl);
            startOcrDetector(videoEl, realW, realH, zoomApplied);

            // 탭 초점
            const viewport = document.getElementById('camera-viewport');
            viewport.onclick = handleViewportTap;

            scannerRunning = true;
        } catch(e) {
            console.error("카메라 시작 실패:", e);
            feedbackError("카메라 접근 실패: " + (e.message || e));
            engineInfo.innerText = "❌ 카메라 실패";
        }
    }

    // ─── 이미지 전처리 (빛 번짐 + 흐림 대응) ─────────────────────────
    // 캔버스의 ImageData를 그레이스케일 + 명암 강조 + 샤프닝으로 처리
    // 빛 번짐(글레어)이 있는 라벨도 디코더가 잘 잡게 보정
    function preprocessImageData(imageData) {
        const data = imageData.data;
        const w = imageData.width;
        const h = imageData.height;
        const len = data.length;

        // 1단계: 그레이스케일 + 명암 강조 (contrast +50%)
        // 빛 번짐 부분(흰색)은 더 흰색으로, 어두운 부분은 더 어둡게
        const contrast = 1.5;
        const intercept = 128 * (1 - contrast);
        for (let i = 0; i < len; i += 4) {
            // 그레이스케일 (luminance 공식)
            const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
            // 명암 강조
            let v = gray * contrast + intercept;
            v = Math.max(0, Math.min(255, v));
            data[i] = data[i+1] = data[i+2] = v;
        }
        return imageData;
    }

    // 더 강한 전처리 - 적응형 이진화 (threshold) 적용
    // 빛 번짐 심한 경우용
    function preprocessImageDataStrong(imageData) {
        const data = imageData.data;
        const w = imageData.width;
        const h = imageData.height;
        const len = data.length;

        // 1단계: 그레이스케일로 변환
        const gray = new Uint8Array(w * h);
        for (let i = 0, j = 0; i < len; i += 4, j++) {
            gray[j] = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        }

        // 2단계: 평균값 계산 (전체 또는 영역별)
        let sum = 0;
        for (let i = 0; i < gray.length; i++) sum += gray[i];
        const avg = sum / gray.length;
        // threshold = 평균값 (이보다 어두우면 0, 밝으면 255)
        const threshold = avg;

        // 3단계: 이진화 + RGBA로 복원
        for (let j = 0, i = 0; j < gray.length; j++, i += 4) {
            const v = gray[j] > threshold ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = v;
        }
        return imageData;
    }

    // ─── ZBar WASM 디코더 (C 네이티브, 1D 바코드 최강) ─────────────────────────
    let zbarCanvas = null;
    let zbarCtx = null;
    let zbarLoopId = null;

    async function startZbarDetector(videoElement, w, h, zoomInfo) {
        const engineInfo = document.getElementById('camera-engine-info');
        try {
            if (!window.zbarReady || !window.zbarScanImageData) {
                console.warn("ZBar WASM 미준비 - 다른 디코더 사용");
                return;
            }

            zbarCanvas = document.createElement('canvas');
            zbarCtx = zbarCanvas.getContext('2d', { willReadFrequently: true });

            // 프레임 카운터로 매 프레임마다 다른 전처리 시도
            let frameCount = 0;

            const tick = async () => {
                if (!scannerRunning || !videoElement || scanPaused) {
                    zbarLoopId = setTimeout(tick, 100);
                    return;
                }
                try {
                    if (videoElement.readyState >= 2) {
                        const vw = videoElement.videoWidth;
                        const vh = videoElement.videoHeight;
                        if (vw > 0 && vh > 0) {
                            // ROI 크게 (95% x 70%)
                            const cropW = Math.floor(vw * 0.95);
                            const cropH = Math.floor(vh * 0.7);
                            const cropX = Math.floor((vw - cropW) / 2);
                            const cropY = Math.floor((vh - cropH) / 2);
                            zbarCanvas.width = cropW;
                            zbarCanvas.height = cropH;
                            zbarCtx.drawImage(videoElement,
                                cropX, cropY, cropW, cropH,
                                0, 0, cropW, cropH);

                            // 프레임마다 다른 전처리 시도 (3가지 로테이션)
                            let imageData = zbarCtx.getImageData(0, 0, cropW, cropH);
                            const variant = frameCount % 3;
                            if (variant === 1) {
                                imageData = preprocessImageData(imageData);
                            } else if (variant === 2) {
                                imageData = preprocessImageDataStrong(imageData);
                            }
                            // variant === 0이면 원본 그대로
                            frameCount++;

                            // ZBar 디코딩
                            const results = await window.zbarScanImageData(imageData);
                            if (results && results.length > 0) {
                                const code = results[0].decode();
                                if (code) {
                                    onBarcodeScanned(code, "zbar");
                                }
                            }
                        }
                    }
                } catch (e) {
                    // 디코딩 실패는 무시
                }
                zbarLoopId = setTimeout(tick, 80);
            };
            tick();
            console.log("✅ ZBar 디코더 가동");
        } catch (e) {
            console.error("ZBar 시작 실패:", e);
        }
    }

    // ─── OCR 디코더 (Tesseract.js) - 바코드 밑 텍스트 인식 ─────────────────────────
    // 바코드 자체가 안 잡힐 때 (빛 번짐, 작은 라벨) 우회 수단
    // 무신사 바코드 텍스트 패턴:
    //   - TWJU261PAJW032SV000 (영문 4 + 숫자 3 + 영문 + 숫자 + ..., 15~20자 영문/숫자)
    //   - 1-0127020002 (숫자 + 하이픈 + 숫자, 짧음)
    // OCR로 읽은 텍스트가 이 패턴에 맞으면 채택
    let ocrWorker = null;
    let ocrCanvas = null;
    let ocrCtx = null;
    let ocrLoopId = null;
    let ocrBusy = false;  // 동시 호출 방지

    async function initOcrWorker() {
        if (ocrWorker || typeof Tesseract === 'undefined') return ocrWorker;
        try {
            console.log("⏳ OCR 워커 초기화 중...");
            ocrWorker = await Tesseract.createWorker('eng', 1, {
                // logger: m => console.log('[OCR]', m)  // 진행 로그 (필요 시)
            });
            // 영문 대문자 + 숫자 + 하이픈만 인식 (정확도 ↑)
            await ocrWorker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                // PSM 7 = 한 줄로 인식 (텍스트가 한 줄이라)
                tessedit_pageseg_mode: '7',
            });
            console.log("✅ OCR 워커 준비 완료");
            return ocrWorker;
        } catch (e) {
            console.error("OCR 워커 초기화 실패:", e);
            return null;
        }
    }

    // 무신사 바코드 텍스트 패턴 검증
    function matchBarcodeTextPattern(text) {
        if (!text) return null;
        const cleaned = text.replace(/\s+/g, '').toUpperCase();

        // 패턴 1: TWJU261PAJW032SV000 - 영문+숫자 혼합, 15~20자
        // 영문 3~5자 시작 + 숫자 + 영문 + 숫자 ... (CODE128 무신사)
        if (/^[A-Z0-9]{15,22}$/.test(cleaned) && /[A-Z]/.test(cleaned) && /\d/.test(cleaned)) {
            return cleaned;
        }
        // 패턴 2: 1-0127020002 - 숫자-숫자 형식
        if (/^\d+-\d{8,12}$/.test(cleaned)) {
            return cleaned;
        }
        return null;
    }

    async function startOcrDetector(videoElement, w, h, zoomInfo) {
        try {
            if (typeof Tesseract === 'undefined') {
                console.warn("Tesseract 미로드 - OCR 사용 안 함");
                return;
            }
            // 워커는 lazy init (메모리 절약, 다운로드는 첫 시도 때)
            ocrCanvas = document.createElement('canvas');
            ocrCtx = ocrCanvas.getContext('2d', { willReadFrequently: true });

            // OCR은 무거우니까 1초에 1번 정도만 시도 (다른 디코더가 메인, OCR은 보조)
            const tick = async () => {
                if (!scannerRunning || !videoElement || scanPaused) {
                    ocrLoopId = setTimeout(tick, 500);
                    return;
                }
                // 이미 OCR 처리 중이면 skip (한 번에 하나만)
                if (ocrBusy) {
                    ocrLoopId = setTimeout(tick, 500);
                    return;
                }
                try {
                    if (videoElement.readyState >= 2) {
                        const vw = videoElement.videoWidth;
                        const vh = videoElement.videoHeight;
                        if (vw > 0 && vh > 0) {
                            // 텍스트가 보통 바코드 아래 또는 위에 있음
                            // ROI는 라이브 영상 중앙 영역 (텍스트 박힌 곳 추정)
                            const cropW = Math.floor(vw * 0.9);
                            const cropH = Math.floor(vh * 0.5);
                            const cropX = Math.floor((vw - cropW) / 2);
                            const cropY = Math.floor((vh - cropH) / 2);
                            ocrCanvas.width = cropW;
                            ocrCanvas.height = cropH;
                            ocrCtx.drawImage(videoElement,
                                cropX, cropY, cropW, cropH,
                                0, 0, cropW, cropH);

                            // 텍스트 인식 시작 - 워커 초기화 lazy
                            ocrBusy = true;
                            const debugEl = document.getElementById('ocr-debug');
                            const debugText = document.getElementById('ocr-debug-text');
                            try {
                                if (debugText) debugText.innerText = '읽는 중...';
                                if (debugEl) debugEl.className = 'ocr-debug';

                                const worker = await initOcrWorker();
                                if (!worker) {
                                    if (debugText) debugText.innerText = '워커 초기화 실패';
                                    ocrBusy = false;
                                    ocrLoopId = setTimeout(tick, 1000);
                                    return;
                                }

                                const { data } = await worker.recognize(ocrCanvas);
                                if (data && data.text) {
                                    // 한 줄씩 검사 - 패턴 맞으면 채택
                                    const lines = data.text.split('\n')
                                        .map(l => l.trim())
                                        .filter(l => l.length >= 3);

                                    let matched = null;
                                    let bestRaw = '';
                                    for (const line of lines) {
                                        const m = matchBarcodeTextPattern(line);
                                        if (m) {
                                            matched = m;
                                            bestRaw = line;
                                            break;
                                        }
                                        if (line.length > bestRaw.length) bestRaw = line;
                                    }

                                    if (matched) {
                                        console.log("📝 OCR 매칭:", matched, "(원본:", bestRaw, ")");
                                        if (debugText) debugText.innerText = `✓ ${matched}`;
                                        if (debugEl) debugEl.className = 'ocr-debug matched';
                                        onBarcodeScanned(matched, 'ocr');
                                    } else if (bestRaw) {
                                        // 패턴 매칭 실패 - 읽은 텍스트는 보여줌
                                        const truncated = bestRaw.length > 30 ? bestRaw.slice(0, 30) + '...' : bestRaw;
                                        if (debugText) debugText.innerText = `읽음: "${truncated}" (패턴 X)`;
                                        if (debugEl) debugEl.className = 'ocr-debug no-match';
                                    } else {
                                        if (debugText) debugText.innerText = '읽힌 글자 없음';
                                        if (debugEl) debugEl.className = 'ocr-debug';
                                    }
                                } else {
                                    if (debugText) debugText.innerText = '읽힌 글자 없음';
                                }
                            } catch (e) {
                                if (debugText) debugText.innerText = '오류: ' + (e.message || e).slice(0, 30);
                            }
                            ocrBusy = false;
                        }
                    }
                } catch (e) {
                    ocrBusy = false;
                }
                // OCR은 1초마다 (CPU 부담 ↓, 다른 디코더가 메인)
                ocrLoopId = setTimeout(tick, 1000);
            };
            tick();
            console.log("✅ OCR 디코더 가동");
        } catch (e) {
            console.error("OCR 시작 실패:", e);
        }
    }

    // ─── zxing-wasm 디코더 (C++ 네이티브) ─────────────────────────
    let zxingWasmCanvas = null;
    let zxingWasmCtx = null;
    let zxingWasmLoopId = null;

    async function startZxingWasmDetector(videoElement, w, h, zoomInfo) {
        const engineInfo = document.getElementById('camera-engine-info');
        try {
            if (!window.zxingWasmReady || !window.zxingReadBarcodes) {
                console.warn("zxing-wasm 미준비 - 백업 디코더만 사용");
                // 엔진 표시 - ZBar 상태도 같이
                const zbarOk = window.zbarReady ? "ZBar+" : "";
                engineInfo.innerText = `엔진: ${zbarOk}Quagga+ZXing+OCR (${w}x${h}${zoomInfo})`;
                return;
            }

            zxingWasmCanvas = document.createElement('canvas');
            zxingWasmCtx = zxingWasmCanvas.getContext('2d', { willReadFrequently: true });

            // 프레임마다 다른 전처리 시도
            let frameCount = 0;

            const tick = async () => {
                if (!scannerRunning || !videoElement || scanPaused) {
                    zxingWasmLoopId = setTimeout(tick, 100);
                    return;
                }
                try {
                    if (videoElement.readyState >= 2) {
                        const vw = videoElement.videoWidth;
                        const vh = videoElement.videoHeight;
                        if (vw > 0 && vh > 0) {
                            // [패치] ROI 확장: 95% x 70% (19자리 긴 바코드 다 들어가게)
                            const cropW = Math.floor(vw * 0.95);
                            const cropH = Math.floor(vh * 0.7);
                            const cropX = Math.floor((vw - cropW) / 2);
                            const cropY = Math.floor((vh - cropH) / 2);
                            zxingWasmCanvas.width = cropW;
                            zxingWasmCanvas.height = cropH;
                            zxingWasmCtx.drawImage(videoElement,
                                cropX, cropY, cropW, cropH,
                                0, 0, cropW, cropH);

                            // 프레임마다 다른 전처리 시도 (ZBar와 다른 페이즈로)
                            let imageData = zxingWasmCtx.getImageData(0, 0, cropW, cropH);
                            const variant = (frameCount + 1) % 3;  // ZBar와 1프레임 offset
                            if (variant === 1) {
                                imageData = preprocessImageData(imageData);
                            } else if (variant === 2) {
                                imageData = preprocessImageDataStrong(imageData);
                            }
                            frameCount++;

                            const results = await window.zxingReadBarcodes(imageData, {
                                tryHarder: true,
                                formats: [
                                    'Code128', 'Code39', 'Code93',
                                    'EAN-13', 'EAN-8',
                                    'UPC-A', 'UPC-E',
                                    'Codabar', 'ITF',
                                    'QRCode', 'DataMatrix'
                                ],
                                maxNumberOfSymbols: 1
                            });
                            if (results && results.length > 0 && results[0].text) {
                                onBarcodeScanned(results[0].text, "zxing-wasm");
                            }
                        }
                    }
                } catch (e) {
                    // 디코딩 실패는 무시
                }
                zxingWasmLoopId = setTimeout(tick, 80);
            };
            tick();
            usingEngine = 'zxing-wasm';
            // ZBar 상태도 포함해서 표시
            const zbarOk = window.zbarReady ? "ZBar+" : "";
            engineInfo.innerText = `엔진: ${zbarOk}ZXing-WASM+Quagga+OCR (${w}x${h}${zoomInfo})`;
        } catch (e) {
            console.error("zxing-wasm 시작 실패:", e);
            const zbarOk = window.zbarReady ? "ZBar+" : "";
            engineInfo.innerText = `엔진: ${zbarOk}Quagga+ZXing+OCR (${w}x${h}${zoomInfo})`;
        }
    }

    // ─── Quagga2 디코더 (1D 바코드 강력) ─────────────────────────
    function startQuaggaDetector(videoElement, w, h, zoomInfo) {
        const engineInfo = document.getElementById('camera-engine-info');
        try {
            if (typeof Quagga === 'undefined') {
                engineInfo.innerText = `엔진: ZXing only (${w}x${h}${zoomInfo})`;
                return;
            }
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: videoElement,
                    constraints: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "environment"
                    },
                    area: {
                        // [패치] 영역 확장: 19자리 긴 바코드 다 들어가게
                        top: "10%", right: "2%",
                        left: "2%", bottom: "10%"
                    }
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: 4,
                frequency: 10,
                decoder: {
                    // [패치] 영문+숫자 혼합 19자리(TWJU...)에 대응
                    // EAN/UPC 같은 숫자 전용 reader 제거 - 오인식 큰 폭 감소
                    // 너의 바코드 형식: CODE128 (영문+숫자) 또는 짧은 숫자 (1-0127020002 = CODE39 가능)
                    readers: [
                        "code_128_reader",
                        "code_39_reader",
                        "code_93_reader"
                    ]
                },
                locate: true
            }, (err) => {
                if (err) {
                    console.error("Quagga 초기화 실패:", err);
                    engineInfo.innerText = `엔진: ZXing only (${w}x${h}${zoomInfo})`;
                    return;
                }
                Quagga.start();
                engineInfo.innerText = `엔진: Quagga+ZXing (${w}x${h}${zoomInfo})`;
                usingEngine = 'quagga';
            });

            Quagga.onDetected(handleQuaggaDetection);
        } catch (e) {
            console.error("Quagga 시작 오류:", e);
            engineInfo.innerText = `엔진: ZXing only (${w}x${h}${zoomInfo})`;
        }
    }

    // Quagga가 인식할 때마다 호출 - 신뢰도 확인 후 처리
    function handleQuaggaDetection(result) {
        // [추가] PDA 확인 대기 중이면 무시
        if (scanPaused || pendingScan) return;

        if (!result || !result.codeResult) return;
        const code = result.codeResult.code;
        if (!code) return;

        // 신뢰도 체크 - 사용자가 ✓ 눌러야 추가되니까 좀 풀어줘도 됨
        const decoded = result.codeResult.decodedCodes || [];
        let totalErr = 0;
        let validCount = 0;
        for (const d of decoded) {
            if (d.error !== undefined) {
                totalErr += d.error;
                validCount++;
            }
        }
        const avgErr = validCount > 0 ? totalErr / validCount : 1;
        // [완화] 0.08 → 0.2 (PDA 확인 모드라 사용자가 검증 가능)
        if (avgErr > 0.2) {
            console.log(`🚫 Quagga 신뢰도 너무 낮음 (err=${avgErr.toFixed(3)}): ${code}`);
            return;
        }

        // [완화] 너무 짧은 거만 거부 (3자 미만은 진짜 노이즈)
        if (code.length < 3) {
            return;
        }

        onBarcodeScanned(code, "quagga");
    }

    // ─── ZXing 백업 디코더 ─────────────────────────
    function startZxingBackupDetector(videoElement) {
        try {
            if (!zxingScanner) {
                const hints = new Map();
                const formats = [
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.EAN_13,
                    ZXing.BarcodeFormat.EAN_8,
                    ZXing.BarcodeFormat.UPC_A,
                    ZXing.BarcodeFormat.UPC_E,
                    ZXing.BarcodeFormat.CODABAR,
                    ZXing.BarcodeFormat.ITF,
                    ZXing.BarcodeFormat.QR_CODE,
                    ZXing.BarcodeFormat.DATA_MATRIX,
                ];
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                zxingScanner = new ZXing.BrowserMultiFormatReader(hints, 200);
            }
            zxingScanner.decodeFromVideoElement(videoElement, (result, err) => {
                if (result) {
                    onBarcodeScanned(result.getText(), "zxing-js");
                }
            });
        } catch (e) {
            console.error("ZXing 백업 시작 실패:", e);
        }
    }

    function stopCamera() {
        scannerRunning = false;
        scanPaused = false;
        // [추가] consensus 상태 초기화
        if (consensusTimer) {
            clearTimeout(consensusTimer);
            consensusTimer = null;
        }
        consensusVotes = {};
        // [추가] OCR 루프 정지 (워커는 유지 - 다음 카메라 켤 때 재사용)
        if (ocrLoopId) {
            clearTimeout(ocrLoopId);
            ocrLoopId = null;
        }
        ocrCanvas = null;
        ocrCtx = null;
        ocrBusy = false;
        // ZBar 루프 정지
        if (zbarLoopId) {
            clearTimeout(zbarLoopId);
            zbarLoopId = null;
        }
        zbarCanvas = null;
        zbarCtx = null;
        // zxing-wasm 루프 정지
        if (zxingWasmLoopId) {
            clearTimeout(zxingWasmLoopId);
            zxingWasmLoopId = null;
        }
        zxingWasmCanvas = null;
        zxingWasmCtx = null;
        // Quagga 정지
        try {
            if (typeof Quagga !== 'undefined') {
                Quagga.offDetected(handleQuaggaDetection);
                Quagga.stop();
            }
        } catch(e) {}
        // 네이티브 루프 정지
        if (detectLoopId) {
            clearTimeout(detectLoopId);
            detectLoopId = null;
        }
        barcodeDetector = null;
        // ZXing 정지
        if (zxingScanner) {
            try { zxingScanner.reset(); } catch(e) {}
        }
        // 카메라 스트림 정지
        if (cameraStream) {
            try {
                cameraStream.getTracks().forEach(t => t.stop());
            } catch(e) {}
            cameraStream = null;
        }
        cameraTrack = null;
        cameraZoomCaps = null;
        currentZoom = 1.0;
        if (videoEl) {
            try { videoEl.srcObject = null; } catch(e) {}
        }
    }

    function stopScanner() {
        const modal = document.getElementById('camera-modal');
        if (modal && modal.classList.contains('open')) {
            modal.classList.remove('open');
        }
        stopCamera();
    }

    // ─── 탭해서 초점 ─────────────────────────
    async function handleViewportTap(e) {
        if (!cameraStream) return;
        try {
            const track = cameraStream.getVideoTracks()[0];
            if (!track) return;
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            const settings = track.getSettings ? track.getSettings() : {};

            // 시각적 피드백 - 노란 원
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const ring = document.createElement('div');
            ring.className = 'focus-ring';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            e.currentTarget.appendChild(ring);
            setTimeout(() => ring.remove(), 500);

            // 초점 강제 트리거
            const advanced = [];
            if (capabilities.focusMode && capabilities.focusMode.includes('manual')) {
                advanced.push({ focusMode: 'manual' });
                setTimeout(async () => {
                    try {
                        await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                    } catch(e) {}
                }, 300);
            } else if (capabilities.focusMode && capabilities.focusMode.includes('single-shot')) {
                advanced.push({ focusMode: 'single-shot' });
            } else {
                advanced.push({ focusMode: 'continuous' });
            }
            // pointsOfInterest 지원하면 그 지점 초점
            if (capabilities.pointsOfInterest) {
                const px = x / rect.width;
                const py = y / rect.height;
                advanced.push({ pointsOfInterest: [{ x: px, y: py }] });
            }
            try {
                await track.applyConstraints({ advanced });
            } catch(e) {
                // 초점 명령 실패 (대부분 폰이 자동 모드)
            }
        } catch (e) {
            console.warn("초점 트리거 실패:", e);
        }
    }

    // ─── 수동 초점 버튼 (🎯) ─────────────────────────
    async function triggerFocus() {
        if (!cameraStream) return;
        try {
            const track = cameraStream.getVideoTracks()[0];
            if (!track) return;
            await track.applyConstraints({
                advanced: [{ focusMode: 'continuous' }]
            });
            // 짧은 진동으로 피드백
            vibrate(30);
            beep(800, 60);
        } catch(e) {}
    }

    // ─── 줌 조절 (➕➖) ─────────────────────────
    async function adjustZoom(direction) {
        if (!cameraTrack || !cameraZoomCaps) return;
        try {
            const step = cameraZoomCaps.step || 0.5;
            let newZoom = currentZoom + (direction * Math.max(step, 0.5));
            newZoom = Math.max(cameraZoomCaps.min, Math.min(cameraZoomCaps.max, newZoom));
            // 소수점 1자리로 반올림
            newZoom = Math.round(newZoom * 10) / 10;
            if (newZoom === currentZoom) return;
            await cameraTrack.applyConstraints({
                advanced: [{ zoom: newZoom }]
            });
            currentZoom = newZoom;
            updateZoomUI();
            // 짧은 피드백
            beep(900, 40);
        } catch(e) {
            console.warn("줌 조절 실패:", e);
        }
    }
    function updateZoomUI() {
        const label = document.getElementById('zoom-label');
        if (label) label.innerText = `${currentZoom.toFixed(1)}x`;
    }

    // ─── 수동 입력 (키보드로 직접) ─────────────────────────
    function submitManualBarcode() {
        const input = document.getElementById('manual-barcode-input');
        const val = (input.value || '').trim();
        if (!val) {
            feedbackError("바코드를 입력하세요");
            return;
        }
        onBarcodeScanned(val);
        input.value = '';
        // 상품 모드면 계속 입력 가능하게 포커스 유지
        if (scanCameraMode === 'product') {
            input.focus();
        }
    }

    // ─── 바코드 인식 콜백 ─────────────────────────
    // SCAN_COOLDOWN_MS: 인식 후 이 시간 동안 다음 인식 무시 (디바운스)
    const SCAN_COOLDOWN_MS = 500;
    // [추가] Consensus 모드 - 0.3초 모아서 가장 자주 나온 값 채택
    // 디코더 4개가 동시에 도는데 한 번 받자마자 채택하면 가짜 결과(Quagga 오인식 등)도
    // 즉시 통과돼버림. 0.3초 모아서 voting 하면 진짜 값만 살아남음.
    const CONSENSUS_WINDOW_MS = 300;
    const CONSENSUS_MIN_VOTES = 2;  // 최소 2번 같은 값 나와야 채택
    let consensusVotes = {};  // {코드: 카운트}
    let consensusTimer = null;
    let consensusStartedAt = 0;

    function onBarcodeScanned(decodedText, source) {
        const code = (decodedText || '').trim();
        if (!code) return;

        // 확인 대기 중이면 추가 인식 무시
        if (scanPaused || pendingScan) return;

        const now = Date.now();
        if ((now - lastScanAt) < SCAN_COOLDOWN_MS) return;

        console.log(`📷 후보 [${source || '?'}]:`, code);

        // [패치] ZBar는 오인식 거의 안 함 - 1표만으로 즉시 채택
        // ZBar = C 네이티브 디코더라 잡으면 거의 다 진짜
        // OCR도 패턴 매칭 통과한 거라 즉시 채택
        if (source === 'zbar' || source === 'ocr') {
            console.log(`✅ ${source} 즉시 채택: ${code}`);
            if (consensusTimer) { clearTimeout(consensusTimer); consensusTimer = null; }
            finalizeWithCode(code);
            return;
        }

        // [Consensus] voting에 추가
        consensusVotes[code] = (consensusVotes[code] || 0) + 1;

        // 첫 후보가 들어오면 타이머 시작
        if (!consensusTimer) {
            consensusStartedAt = now;
            consensusTimer = setTimeout(finalizeConsensus, CONSENSUS_WINDOW_MS);
        }

        // 같은 값이 MIN_VOTES 도달하면 즉시 채택 (빠른 인식)
        // - 디코더 2개가 같은 값 던지면 진짜일 확률 매우 높음
        if (consensusVotes[code] >= CONSENSUS_MIN_VOTES) {
            console.log(`✅ 즉시 채택 (${consensusVotes[code]}표): ${code}`);
            clearTimeout(consensusTimer);
            consensusTimer = null;
            finalizeWithCode(code);
        }
    }

    // Consensus 윈도우 종료 시 호출 - 가장 많이 나온 값 채택
    function finalizeConsensus() {
        consensusTimer = null;

        // 가장 표 많은 거 선택
        let bestCode = null;
        let bestVotes = 0;
        for (const [code, votes] of Object.entries(consensusVotes)) {
            if (votes > bestVotes) {
                bestVotes = votes;
                bestCode = code;
            }
        }

        if (!bestCode) {
            consensusVotes = {};
            return;
        }

        // 단독 1표면 신뢰도 낮음 - 채택은 하되 로그 남김
        if (bestVotes < CONSENSUS_MIN_VOTES) {
            console.warn(`⚠️ 단독 1표 채택: ${bestCode} (다른 후보: ${Object.keys(consensusVotes).filter(c => c !== bestCode).join(',') || '없음'})`);
        } else {
            console.log(`✅ Consensus 채택 (${bestVotes}표): ${bestCode}`);
        }
        finalizeWithCode(bestCode);
    }

    function finalizeWithCode(code) {
        // voting 초기화
        consensusVotes = {};
        lastScanText = code;
        lastScanAt = Date.now();

        // [PDA 확인 모드] 즉시 처리 X → 확인 오버레이 띄움
        showScanConfirm(code);
    }

    // ─── PDA 확인 오버레이 표시 ─────────────────────────
    function showScanConfirm(code) {
        // 카메라/디코더 일시 정지
        scanPaused = true;
        try {
            if (typeof Quagga !== 'undefined') {
                Quagga.pause();
            }
        } catch(e) {}
        // ZXing JS는 자체 정지 어려워서 그냥 pendingScan 플래그로 차단
        // zxing-wasm 루프는 scanPaused 체크로 자동 일시정지

        // 비디오도 멈춤 (시각적으로 정지된 느낌)
        if (videoEl) {
            try { videoEl.pause(); } catch(e) {}
        }

        // 어떤 종류인지 판별
        let kind = 'product';
        let label = '바코드';
        let banner = '✓ 스캔 완료';
        if (scanCameraMode === 'location') {
            kind = 'loc';
            label = '로케이션';
            banner = '📍 로케 인식';
        } else if (isLocationBarcode(code)) {
            kind = 'loc';
            label = '로케이션 (자동 인식)';
            banner = '📍 로케 변경';
        }

        // 너무 짧은 결과는 의심 - 경고 표시지만 추가는 가능
        if (code.length < 5 && kind === 'product') {
            kind = 'error';
            banner = '⚠️ 너무 짧음 (오인식 의심)';
        }

        // pendingScan에 저장 + 오버레이 표시
        pendingScan = { code, kind };

        const confirm = document.getElementById('scan-confirm');
        const bannerEl = document.getElementById('scan-confirm-banner');
        const labelEl = document.getElementById('scan-confirm-label');
        const valueEl = document.getElementById('scan-confirm-value');

        confirm.className = 'scan-confirm open kind-' + kind;
        bannerEl.innerText = banner;
        labelEl.innerText = label;
        valueEl.innerText = code;

        // 피드백 (소리/진동)
        beep(1200, 80);
        vibrate(50);
    }

    // ─── ✓ 추가하고 계속 ─────────────────────────
    function acceptPendingScan() {
        if (!pendingScan) return;
        const { code, kind } = pendingScan;

        if (kind === 'loc' || scanCameraMode === 'location') {
            // 로케 처리
            const locValue = code.toUpperCase();
            scanState.currentLoc = locValue;
            updateLocUI(locValue);
            saveScanDraft();
            // 로케 모드면 모달 닫기
            if (scanCameraMode === 'location') {
                hideScanConfirm();
                closeCameraModal();
                return;
            }
            // 상품 모드 중 로케 인식 - info 갱신
            const info = document.getElementById('camera-modal-info');
            if (info) info.innerText = `📍 ${locValue} · 연속 스캔`;
        } else {
            // 상품 처리
            if (!scanState.currentLoc) {
                feedbackError("로케이션이 없어요");
                hideScanConfirm();
                return;
            }
            const item = {
                barcode: code,
                qty: 1,
                location: scanState.currentLoc,
                ts: Date.now()
            };
            scanState.items.push(item);
            renderScanList();
            saveScanDraft();
            const status = document.getElementById('camera-modal-status');
            if (status) status.innerText = `${scanState.items.length}건`;
        }

        // 확인 닫고 카메라 재개
        hideScanConfirm();
    }

    // ─── ✗ 다시 (잘못 찍음) ─────────────────────────
    function cancelPendingScan() {
        if (!pendingScan) return;
        // 그냥 닫기만, 데이터 추가 X
        beep(600, 80);
        vibrate(30);
        hideScanConfirm();
    }

    // 오버레이 숨기고 디코더 재개
    function hideScanConfirm() {
        const confirm = document.getElementById('scan-confirm');
        if (confirm) confirm.classList.remove('open');
        pendingScan = null;
        // [추가] consensus 정리 - 다음 스캔은 fresh 하게
        if (consensusTimer) {
            clearTimeout(consensusTimer);
            consensusTimer = null;
        }
        consensusVotes = {};
        // 비디오 재개
        if (videoEl) {
            try { videoEl.play(); } catch(e) {}
        }
        // Quagga 재개
        try {
            if (typeof Quagga !== 'undefined') {
                Quagga.start();
            }
        } catch(e) {}
        // 1초 후 디코더 재가동 (사용자가 카메라 다시 위치 잡을 시간)
        setTimeout(() => {
            scanPaused = false;
            lastScanText = '';
            lastScanAt = Date.now();  // 쿨다운 새로 시작
        }, 800);
    }

    function handleProductScan(barcode) {
        if (!scanState.currentLoc) {
            feedbackError("로케이션이 없어요");
            return;
        }

        const item = {
            barcode: barcode,
            qty: 1,
            location: scanState.currentLoc,
            ts: Date.now()
        };
        scanState.items.push(item);
        renderScanList();
        saveScanDraft();
        feedbackScanSuccess(barcode);  // [수정] 바코드 값 전달 - 플래시에 표시

        const status = document.getElementById('camera-modal-status');
        if (status) status.innerText = `${scanState.items.length}건`;
    }

    // ─── 스캔 목록 렌더링 ─────────────────────────
    function renderScanList() {
        const box = document.getElementById('scan-list-box');
        const countEl = document.getElementById('scan-count');
        const sendBtn = document.getElementById('scan-send-btn');

        const items = scanState.items || [];
        countEl.innerText = items.length;
        sendBtn.disabled = items.length === 0;
        sendBtn.innerText = `📤 관리자에게 전송 (${items.length}건)`;

        if (items.length === 0) {
            box.innerHTML = '<div class="scan-empty">아직 스캔한 게 없어요</div>';
            return;
        }

        // 최신 50개만 표시 (성능)
        const showItems = items.slice().reverse().slice(0, 100);
        const totalCount = items.length;
        let html = '';
        showItems.forEach((it, idx) => {
            const realIdx = totalCount - 1 - idx;  // 원본 인덱스
            html += `<div class="scan-item">
                <div style="flex:1; min-width:0;">
                    <div class="barcode">${escapeHtml(it.barcode)}</div>
                    <div class="loc">📍 ${escapeHtml(it.location || '?')}</div>
                </div>
                <div class="qty">x${it.qty}</div>
                <button class="del-btn" onclick="deleteScanItem(${realIdx})" title="이 행 삭제">✕</button>
            </div>`;
        });
        if (totalCount > showItems.length) {
            html += `<div class="scan-empty">... 외 ${totalCount - showItems.length}건</div>`;
        }
        box.innerHTML = html;
    }

    function deleteScanItem(idx) {
        if (idx < 0 || idx >= scanState.items.length) return;
        scanState.items.splice(idx, 1);
        renderScanList();
        saveScanDraft();
    }

    function undoLastScan() {
        if (scanState.items.length === 0) {
            feedbackError("취소할 항목 없음");
            return;
        }
        scanState.items.pop();
        renderScanList();
        saveScanDraft();
        beep(600, 80);
        vibrate(30);
    }

    function clearAllScans() {
        if (scanState.items.length === 0) {
            // 그냥 작업명/로케만 초기화
            if (!confirm("작업명과 로케를 초기화할까요?")) return;
        } else {
            if (!confirm(`스캔한 ${scanState.items.length}건을 전부 삭제할까요?\n(전송 안 한 데이터는 사라집니다)`)) return;
        }
        scanState = {
            mode: scanState.mode,
            label: '',
            currentLoc: '',
            fromLoc: '',
            toLoc: '',
            moveFocus: 'from',
            items: []
        };
        document.getElementById('scan-label').value = '';
        updateLocUI('');
        renderScanList();
        clearScanDraft();
    }

    // ─── 전송 (Firestore) ─────────────────────────
    async function sendScanSession() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) {
            feedbackError("작업자 이름이 등록되지 않았어요");
            return;
        }
        if (scanState.items.length === 0) {
            feedbackError("스캔 데이터 없음");
            return;
        }
        const label = (document.getElementById('scan-label').value || '').trim();
        if (!label) {
            feedbackError("작업명을 입력하세요");
            return;
        }

        const sendBtn = document.getElementById('scan-send-btn');
        const originalText = sendBtn.innerText;
        sendBtn.disabled = true;
        sendBtn.innerText = '📤 전송 중...';

        try {
            // Firestore에 저장
            await db.collection("scan_sessions").add({
                user: name,
                mode: scanState.mode,
                label: label,
                items: scanState.items.map(it => ({
                    barcode: it.barcode,
                    qty: it.qty,
                    location: it.location || '',
                    ts: it.ts || Date.now()
                })),
                item_count: scanState.items.length,
                status: "pending",
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            });

            feedbackSent();
            showToast(`✅ ${scanState.items.length}건 전송 완료!`);

            // 초기화
            scanState.items = [];
            scanState.label = '';
            scanState.currentLoc = '';
            document.getElementById('scan-label').value = '';
            updateLocUI('');
            renderScanList();
            clearScanDraft();
        } catch (e) {
            console.error("스캔 전송 실패:", e);
            feedbackError("전송 실패: " + e.message);
            sendBtn.disabled = false;
            sendBtn.innerText = originalText;
        }
    }

    // ─── 초기화 (DOM 로드 후 호출) ─────────────────────────
    function initScanSystem() {
        initScanSettingsUI();
        loadScanDraft();
        renderScanList();
        // 작업명 변경 시 자동 저장
        const labelInput = document.getElementById('scan-label');
        if (labelInput) {
            labelInput.addEventListener('input', () => {
                scanState.label = labelInput.value;
                saveScanDraft();
            });
        }
        // 로케 입력칸 직접 편집 시 저장
        const locInput = document.getElementById('scan-loc-input');
        if (locInput) {
            locInput.addEventListener('input', () => {
                scanState.currentLoc = locInput.value.toUpperCase();
                saveScanDraft();
            });
            // 포커스 빠질 때 대문자 변환
            locInput.addEventListener('blur', () => {
                const v = locInput.value.trim().toUpperCase();
                locInput.value = v;
                scanState.currentLoc = v;
                saveScanDraft();
            });
        }
    }
    // window.onload 끝나면 자동 호출됨 (아래에서 hook)
    if (document.readyState !== 'loading') {
        setTimeout(initScanSystem, 0);
    } else {
        document.addEventListener('DOMContentLoaded', initScanSystem);
    }
</script>

<script>
// 서비스 워커 등록 (PWA - 어플처럼 동작)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('✅ ServiceWorker 등록됨:', reg.scope))
            .catch(err => console.error('❌ ServiceWorker 등록 실패:', err));
    });
}
</script>
