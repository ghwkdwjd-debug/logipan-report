<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>로지판 - 통합 현장 관리 (v2.1)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <!-- [추가] 바코드 디코더
         메인: ZBar WASM (C 네이티브, 1D 바코드 강력) + zxing-wasm (C++ WASM)
         백업: ZXing JS, Quagga
         OCR: Tesseract.js (바코드 안 잡힐 때 텍스트로 우회)
         + 이미지 전처리로 빛 번짐 대응 -->
    <script type="module">
        // ZBar WASM은 ES module - 글로벌로 노출
        try {
            const zbar = await import("https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.10.1/+esm");
            window.zbarScanImageData = zbar.scanImageData;
            window.zbarReady = true;
            console.log("✅ ZBar WASM 준비 완료");
        } catch (e) {
            console.error("ZBar WASM 로드 실패:", e);
            window.zbarReady = false;
        }
    </script>
    <script type="module">
        // zxing-wasm은 ES module - 글로벌로 노출
        import { readBarcodes, prepareZXingModule } from "https://cdn.jsdelivr.net/npm/zxing-wasm@2.1.5/+esm";
        // WASM 미리 로드
        try {
            await prepareZXingModule();
            window.zxingWasmReady = true;
            window.zxingReadBarcodes = readBarcodes;
            console.log("✅ zxing-wasm 준비 완료");
        } catch (e) {
            console.error("zxing-wasm 로드 실패:", e);
            window.zxingWasmReady = false;
        }
    </script>
    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <!-- [추가] OCR - 바코드 밑 텍스트 인식 (Tesseract.js, 영문+숫자만이라 가볍게) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #f4f7f9; margin: 0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 550px; margin: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; position: relative; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #eee; color: #666; position: relative; }
        .tab-btn.active { background: #222; color: white; }
        .tab-dot { position: absolute; top: 6px; right: 8px; width: 9px; height: 9px; border-radius: 50%; background: #ff4d4f; display: none; box-shadow: 0 0 0 2px white; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
        h2 { text-align: center; font-size: 20px; margin-bottom: 20px; color: #222; }
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        button.main-btn { width: 100%; padding: 16px; background: #222; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .notice-box { background: #fff9c4; padding: 15px; border-radius: 10px; border-left: 5px solid #fbc02d; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        .notice-box small { display: block; color: #7f8c8d; margin-bottom: 5px; font-size: 11px; }
        .notice-text-collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        .notice-toggle-btn { background: none; border: none; color: #f39c12; font-size: 12px; font-weight: bold; cursor: pointer; padding: 4px 0 0 0; }
        .search-box { display: flex; gap: 8px; margin-top: 20px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 10px !important; font-size: 13px !important; }
        .search-btn { width: 70px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .refresh-btn { width: 70px; background: #34a853; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .report-item { background: #fff; border: 1px solid #eef0f2; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .report-item.done { opacity: 0.85; background: #f9f9f9; border: 1px solid #ddd; }
        .report-item.has-new { border: 2px solid #ff4d4f; box-shadow: 0 2px 8px rgba(255,77,79,0.15); }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 8px; }
        .wait { background: #fff3e0; color: #ef6c00; }
        .done { background: #e8f5e9; color: #2e7d32; }
        .talking { background: #e3f2fd; color: #0d47a1; }
        .new-badge { background: #ff4d4f; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-left: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        .comment-section { display: none; margin-top: 10px; background: #f8f9fa; border-radius: 8px; padding: 12px; font-size: 13px; border: 1px solid #eee; }
        .comment-bubble { padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; line-height: 1.4; word-break: break-word; }
        .admin-msg { background: #e7f3ff; border-left: 4px solid #1a73e8; }
        .user-msg { background: #f0f0f0; border-left: 4px solid #999; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); color: white; text-align: center; padding-top: 220px; z-index: 1000; font-size: 16px; }
        #loading-progress { width: 70%; max-width: 300px; margin: 20px auto 0; background: rgba(255,255,255,0.2); border-radius: 8px; overflow: hidden; height: 14px; display: none; }
        #loading-progress-bar { height: 100%; background: #4CAF50; width: 0%; transition: width 0.3s; border-radius: 8px; }
        .reply-box { margin-top: 10px; background: #e7f3ff; padding: 10px; border-radius: 8px; border-left: 4px solid #1877f2; font-size: 13px; }
        #photoPreview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .preview-thumb { position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
        .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .preview-thumb .remove-btn { position: absolute; top: 2px; right: 2px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.7); color: white; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0; }
        .attached-photos { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .attached-photos img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid #eee; transition: transform 0.15s; }
        .attached-photos img:hover { transform: scale(1.05); }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 4px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        #lightbox-close { position: absolute; top: 20px; right: 25px; background: rgba(255,255,255,0.15); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 22px; cursor: pointer; }
        .draft-notice { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; border-radius: 6px; padding: 8px 12px; margin-top: 10px; font-size: 13px; display: none; }
        .draft-notice button { background: none; border: none; color: #1a73e8; font-weight: bold; cursor: pointer; margin-left: 8px; text-decoration: underline; font-size: 13px; }

        /* [추가] 작업 종류 버튼 */
        .category-row { display: flex; gap: 6px; margin-top: 6px; }
        .category-btn {
            flex: 1;
            padding: 11px 6px;
            border: 1px solid #e0e0e0;
            background: #f5f6f8;
            color: #666;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }
        .category-btn:hover { background: #ebebeb; }
        .category-btn.active {
            background: #222;
            color: white;
            border-color: #222;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        /* [추가] 새 메시지 알림 카드 (현장보고 탭에서 표시) */
        .new-msg-card {
            background: linear-gradient(135deg, #1877F2 0%, #4285F4 100%);
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.25);
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .new-msg-card .icon {
            font-size: 22px;
            margin-right: 12px;
            animation: bell-shake 1.2s ease-in-out infinite;
        }
        @keyframes bell-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }
        .new-msg-card .text { flex: 1; font-size: 14px; font-weight: bold; }
        .new-msg-card .arrow { font-size: 18px; }

        /* [추가] 새 메시지 토스트 (화면 하단 잠깐 표시) */
        .msg-toast {
            position: fixed;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            background: rgba(24, 119, 242, 0.95);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 3000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            min-width: 250px;
            max-width: 90%;
            cursor: pointer;
            animation: toastSlide 0.3s ease-out;
        }
        @keyframes toastSlide {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .msg-toast .title { font-weight: bold; margin-bottom: 4px; font-size: 13px; }
        .msg-toast .preview { font-size: 13px; opacity: 0.95; }

        /* ===== [추가] 📦 스캔 탭 전용 스타일 ===== */
        .scan-mode-row { display: flex; gap: 6px; margin: 10px 0 14px; }
        .scan-mode-btn {
            flex: 1; padding: 11px 6px;
            border: 1px solid #e0e0e0; background: #f5f6f8; color: #666;
            border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.15s;
        }
        .scan-mode-btn.active {
            background: #1877F2; color: white; border-color: #1877F2;
            box-shadow: 0 2px 6px rgba(24,119,242,0.25);
        }
        .scan-mode-btn:disabled {
            opacity: 0.4; cursor: not-allowed; background: #f0f0f0;
        }

        /* 로케 입력 + 카메라 버튼 */
        .loc-input-row {
            display: flex; gap: 8px; align-items: stretch;
        }
        .loc-input-row input {
            flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 15px; outline: none; box-sizing: border-box;
            font-family: monospace; letter-spacing: 1px; font-weight: bold;
        }
        .loc-cam-btn {
            width: 52px; flex-shrink: 0;
            background: #fbc02d; color: #333; border: none; border-radius: 8px;
            font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 6px rgba(251,192,45,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .loc-cam-btn:active { transform: scale(0.96); background: #f9a825; }

        /* 큰 상품 스캔 버튼 */
        .product-scan-btn {
            width: 100%; margin-top: 18px;
            background: linear-gradient(135deg, #1877F2 0%, #4285F4 100%);
            color: white; border: none; border-radius: 14px;
            padding: 22px 18px; cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 4px 14px rgba(24,119,242,0.3);
            transition: transform 0.1s;
        }
        .product-scan-btn:active { transform: scale(0.98); }
        .product-scan-btn .icon { font-size: 32px; }
        .product-scan-btn .text { display: flex; flex-direction: column; align-items: flex-start; flex:1; }
        .product-scan-btn .title { font-size: 17px; font-weight: bold; margin-bottom: 2px; }
        .product-scan-btn .sub { font-size: 12px; opacity: 0.9; }

        /* 카메라 모달 (작은 영역) */
        .camera-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000;
            justify-content: center; align-items: center; padding: 16px;
            box-sizing: border-box;
        }
        .camera-modal.open { display: flex; }
        .camera-modal-card {
            background: white; border-radius: 16px;
            width: 100%; max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            animation: modalIn 0.2s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .camera-modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; border-bottom: 1px solid #eee;
        }
        .camera-modal-title {
            font-size: 16px; font-weight: bold; color: #333;
        }
        .camera-modal-close {
            background: #f5f6f8; border: none; border-radius: 50%;
            width: 32px; height: 32px; font-size: 16px; cursor: pointer;
            color: #666;
        }
        .camera-modal-info {
            text-align: center; padding: 8px 16px;
            font-size: 12px; color: #999;
        }
        .camera-modal-viewport {
            position: relative;
            background: #000; margin: 0 14px;
            border-radius: 10px; overflow: hidden;
            min-height: 180px;
            max-height: 220px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #scan-reader { width: 100%; height: 100%; }
        #scan-reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            display: block;
        }
        .camera-guide-box {
            position: absolute;
            top: 50%; left: 50%;
            width: 90%; height: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 4px;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
        }
        /* [추가] 빨간 인식선 - PDA 레이저처럼 */
        .scan-laser-line {
            position: absolute;
            top: 50%; left: 50%;
            width: 86%; height: 2px;
            transform: translate(-50%, -50%);
            background: linear-gradient(to right,
                transparent,
                rgba(255, 50, 50, 0.9) 10%,
                rgba(255, 50, 50, 0.95) 50%,
                rgba(255, 50, 50, 0.9) 90%,
                transparent);
            pointer-events: none;
            box-shadow: 0 0 8px rgba(255, 50, 50, 0.6);
            animation: laserPulse 2s ease-in-out infinite;
        }
        @keyframes laserPulse {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; }
        }
        .focus-hint {
            position: absolute; bottom: 6px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white;
            padding: 3px 10px; border-radius: 10px;
            font-size: 10px; pointer-events: none;
            opacity: 0.7;
        }
        .focus-ring {
            position: absolute;
            width: 60px; height: 60px;
            border: 2px solid #ffeb3b;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: focusPulse 0.5s ease-out forwards;
        }
        @keyframes focusPulse {
            0% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* [추가] 스캔 성공 시 화면 전체 플래시 + 값 표시 */
        .scan-flash {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(76, 175, 80, 0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            pointer-events: none;
            animation: flashFade 0.7s ease-out forwards;
            border-radius: 10px;
        }
        .scan-flash.loc { background: rgba(251, 192, 45, 0.9); }
        .scan-flash.error { background: rgba(220, 38, 38, 0.85); }
        @keyframes flashFade {
            0% { opacity: 0; }
            15% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .scan-flash .flash-content {
            color: white; text-align: center; padding: 12px;
            max-width: 90%;
        }
        .scan-flash .flash-icon {
            font-size: 36px; margin-bottom: 4px;
            animation: flashIconPop 0.4s ease-out;
        }
        @keyframes flashIconPop {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .scan-flash .flash-label {
            font-size: 13px; font-weight: bold; opacity: 0.95;
            margin-bottom: 4px;
        }
        .scan-flash .flash-value {
            font-size: 16px; font-family: monospace;
            background: rgba(0,0,0,0.25);
            padding: 4px 10px; border-radius: 6px;
            display: inline-block;
            word-break: break-all;
        }

        /* [추가] PDA 확인 오버레이 - 스캔 후 사용자가 ✓ 누르기 전까지 멈춤 */
        .scan-confirm {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 30, 10, 0.92);
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 200;
            border-radius: 10px;
            padding: 16px;
        }
        .scan-confirm.open { display: flex; animation: confirmIn 0.15s ease-out; }
        .scan-confirm.kind-loc { background: rgba(40, 30, 0, 0.92); }
        .scan-confirm.kind-error { background: rgba(50, 10, 10, 0.92); }
        @keyframes confirmIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .scan-confirm .confirm-banner {
            background: #16A34A; color: white;
            padding: 8px 22px; border-radius: 20px;
            font-size: 14px; font-weight: bold;
            margin-bottom: 14px;
        }
        .scan-confirm.kind-loc .confirm-banner { background: #fbc02d; color: #333; }
        .scan-confirm.kind-error .confirm-banner { background: #DC2626; color: white; }
        .scan-confirm .confirm-value-box {
            background: rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: center;
            margin-bottom: 18px;
            max-width: 90%;
        }
        .scan-confirm .confirm-label {
            font-size: 11px; color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }
        .scan-confirm .confirm-value {
            font-family: monospace; color: white;
            font-size: 18px; font-weight: bold;
            word-break: break-all;
            letter-spacing: 1px;
        }
        .scan-confirm .confirm-btns {
            display: flex; gap: 10px;
            width: 100%; max-width: 320px;
        }
        .scan-confirm .confirm-btn {
            flex: 1; padding: 14px 8px;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: bold;
            cursor: pointer;
        }
        .scan-confirm .confirm-btn.ok {
            background: #16A34A; color: white;
            box-shadow: 0 2px 8px rgba(22,163,74,0.4);
        }
        .scan-confirm .confirm-btn.ok:active { background: #15803D; }
        .scan-confirm .confirm-btn.cancel {
            background: rgba(255,255,255,0.15); color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .scan-confirm .confirm-btn.cancel:active { background: rgba(255,255,255,0.25); }

        .camera-engine-info {
            text-align: center;
            font-size: 11px; color: #999;
            padding: 4px;
        }
        /* [추가] OCR 실시간 디버그 - OCR이 뭘 읽고 있는지 보여줌 */
        .ocr-debug {
            margin: 0 16px 6px;
            padding: 6px 10px;
            background: #f5f6f8;
            border-radius: 6px;
            font-size: 11px;
            color: #666;
            font-family: monospace;
            min-height: 18px;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;

        if (Notification.permission !== 'granted') {
            alert("먼저 🔔 알림 켜기 버튼을 눌러주세요!");

    function updateNotifButton() {

    // 사용자가 버튼 클릭하면 권한 요청 + 토큰 발급
    async function enableNotifications() {
        const userName = localStorage.getItem("logipan_user_name");
        if (!userName) {
            alert("먼저 작업자 이름을 등록해주세요");
            return;
        }
        if (!messaging) {
            alert("⚠️ 이 브라우저는 푸시 알림을 지원하지 않습니다.\n\n아이폰: 사파리에서 '홈 화면에 추가' 후 그 어플로 들어와주세요.\n안드로이드: 크롬 사용 권장");
            return;
        }

        try {
            // 권한 요청
            const permission = await Notification.requestPermission();
            if (permission === 'denied') {
                alert("🔕 알림이 차단되었습니다.\n\n폰 설정에서 직접 허용해주세요:\n[설정] → [알림] → [로지판]");
                updateNotifButton();
                return;
            }
            if (permission !== 'granted') {
                updateNotifButton();
                return;
            }

            // 기존 서비스워커 모두 해제 (깨끗한 상태로)
            const allRegs = await navigator.serviceWorker.getRegistrations();
            for (const reg of allRegs) {
                await reg.unregister();
            }

            // 새 FCM 서비스워커 등록
            const swRegistration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
            await navigator.serviceWorker.ready;

            // 기존 토큰 삭제 후 새 토큰 발급
            try {
                await messaging.deleteToken();
            } catch (e) {}

            const token = await messaging.getToken({
                vapidKey: VAPID_KEY,
                serviceWorkerRegistration: swRegistration
            });
            if (!token) {
                alert("토큰 발급 실패. 다시 시도해주세요.");
                return;
            }
            console.log("✅ FCM 토큰:", token.substring(0, 30) + "...");

            // Firestore 저장
            await db.collection("fcm_tokens").doc(userName).set({
                token: token,
                user: userName,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                userAgent: navigator.userAgent
            });

            // 포그라운드 메시지 수신
            messaging.onMessage(payload => {
                console.log("📨 메시지:", payload);
                const title = payload.data?.title || payload.notification?.title || "새 알림";
                const body = payload.data?.body || payload.notification?.body || "";
                showToast(`🔔 ${title}: ${body}`);
                if (Notification.permission === 'granted' && swRegistration) {
                    swRegistration.showNotification(title, {
                        body: body,
                        icon: 'https://ghwkdwjd-debug.github.io/logipan-report/icon.png',
                        tag: 'logipan-fg-' + Date.now()
                    });
                }
            });

            updateNotifButton();
            showToast("✅ 알림이 켜졌습니다!");
        } catch (e) {
            console.error("알림 설정 실패:", e);
            alert("알림 설정 실패: " + (e.message || e));
        }
    }

    function loadNotice() {
        const currentWorker = localStorage.getItem("logipan_user_name");
        db.collection("board_posts")
        .where("receiver", "in", ["all", currentWorker])
        .orderBy("timestamp", "desc")
        .limit(20)
        .onSnapshot(snap => {
            const box = document.getElementById("notice-content");
            let shown = false;

            // [추가] 새 메시지 감지 (공지 + 개인 메시지)
            snap.forEach(doc => {
                const d = doc.data();
                // 완료된 거는 알림 X
                if (d.status && (d.status.includes("완료") || d.status.includes("확인완료"))) return;
                // 카테고리: 공지 또는 요청만 알림
                if (d.category !== "공지" && d.category !== "요청") return;
                const sender = d.real_sender || d.user || "관리자";
                const preview = d.text || '';
                triggerNewMsgAlert(sender, preview, doc.id);
            });

            // 첫 로드 완료 마킹 (이후부터 알림 발동)
            if (firstBoardLoad) {
                snap.forEach(doc => knownBoardIds.add(doc.id));
                firstBoardLoad = false;
            }

            snap.forEach(doc => {
                if (shown) return;
                const d = doc.data();
                // [수정] '공지' 카테고리만 표시 (개인지시/문의/기타는 제외)
                if (d.category !== "공지") return;
                if (d.status && (d.status.includes("완료") || d.status.includes("확인완료"))) return;
                const sender = d.real_sender || d.user || "관리자";
                const fullText = `📢 ${d.text}\n— ${sender}`;
                box.innerHTML = '';
                const txtDiv = document.createElement('div');
                txtDiv.className = 'notice-text-collapsed';
                txtDiv.innerText = fullText;
                box.appendChild(txtDiv);
                setTimeout(() => {
                    if (txtDiv.scrollHeight > txtDiv.clientHeight + 2) {
                        const btn = document.createElement('button');
                        btn.className = 'notice-toggle-btn';
                        btn.innerText = '...더보기 ▼';
                        btn.onclick = () => { const collapsed = txtDiv.classList.toggle('notice-text-collapsed'); btn.innerText = collapsed ? '...더보기 ▼' : '▲ 접기'; };
                        if (!box.querySelector('.notice-toggle-btn')) box.appendChild(btn);
                    }
                }, 50);
                shown = true;
            });
            if (!shown) box.innerText = "현재 등록된 공지가 없습니다.";
        });
    }

    let myPostsListener = null;
    function loadMyBoardPosts() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) return;
        if (myPostsListener) myPostsListener();
        myPostsListener = db.collection("board_posts")
          .where("user", "==", name)
          .onSnapshot(snap => {
              const listDiv = document.getElementById("my-board-list");
              unsubscribeAllBoardMessages();
              listDiv.innerHTML = "";
              if (snap.empty) { listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center;'>문의 내역이 없습니다.</p>"; return; }
              let docs = [];
              snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
              docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
              let renderedCount = 0;
              docs.forEach(d => {
                if (d.category === "공지") return;
                if (d.status && d.status.includes("완료")) return;
                const item = document.createElement("div");
                item.className = "report-item";
                item.id = `bpost-${d.id}`;
                let badgeClass = 'wait';
                let badgeText = d.status || '신규';
                if (d.status && d.status.includes('대화')) { badgeClass = 'talking'; badgeText = '💬 대화중'; }
                else if (d.status && d.status.includes('확인')) { badgeClass = 'done'; badgeText = '✅ 확인'; }
                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-weight:bold; color:#555;">💬 내 메시지${d.edited ? ' <span style="color:#999;font-size:11px;font-weight:normal;">(수정됨)</span>' : ''}</span>
                        <div>
                            <span class="status-badge ${badgeClass}" style="margin:0;">${badgeText}</span>
                            <button onclick="editMyPost('${d.id}', ${JSON.stringify(d.text || '')})" style="margin-left:6px; border:none; background:none; color:#1a73e8; cursor:pointer; font-size:12px;">✏️ 수정</button>
                            <button onclick="deleteMyPost('${d.id}')" style="margin-left:2px; border:none; background:none; color:#ff4d4f; cursor:pointer; font-size:12px;">🗑️ 삭제</button>
                        </div>
                    </div>
                    <div style="font-size:14px; margin-bottom:5px; line-height:1.4; white-space: pre-wrap;">${escapeHtml(d.text)}</div>
                `;
                if (d.reply) {
                    const replyFrom = d.reply_sender || "관리자";
                    html += `<div class="reply-box"><b style="color:#1877f2; font-size:11px;">📢 ${escapeHtml(replyFrom)} 답변</b><br>${escapeHtml(d.reply)}</div>`;
                }
                html += `
                    <button onclick="toggleBoardThread('${d.id}')" style="background:none;border:none;color:#1a73e8;font-size:13px;font-weight:bold;margin-top:10px;display:block; padding:0;">
                        💬 대화 보기 <span id="bcount-${d.id}">(...)</span><span id="bnew-${d.id}"></span>
                    </button>
                    <div id="bsec-${d.id}" class="comment-section">
                        <div id="bcomments-${d.id}"></div>
                        <div style="display:flex; gap:5px; margin-top:10px; align-items:center;">
                            <input type="text" id="binput-${d.id}" placeholder="답장 입력" style="flex:1; padding:8px; font-size:13px;">
                            <label for="bphoto-${d.id}" style="background:#f0f2f5; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:13px;" title="사진 첨부">📷</label>
                            <input type="file" id="bphoto-${d.id}" accept="image/*" style="display:none;" onchange="markBoardPhoto('${d.id}')">
                            <button onclick="sendBoardReply('${d.id}')" style="background:#1a73e8; color:white; border:none; border-radius:6px; padding:0 12px; font-weight:bold;">전송</button>
                        </div>
                        <div id="bphotoinfo-${d.id}" style="font-size:11px; color:#1a73e8; margin-top:4px;"></div>
                    </div>
                `;
                item.innerHTML = html;
                listDiv.appendChild(item);
                renderedCount++;
                subscribeBoardMessages(d.id);
            });
            if (renderedCount === 0) listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center;'>표시할 문의 내역이 없습니다.</p>";
          }, err => { console.error("데이터 불러오기 오류:", err); });
    }

    let boardMsgListeners = {};
    function unsubscribeAllBoardMessages() {
        Object.values(boardMsgListeners).forEach(unsub => { try { unsub(); } catch (e) {} });
        boardMsgListeners = {};
    }
    function subscribeBoardMessages(docId) {
        if (boardMsgListeners[docId]) { try { boardMsgListeners[docId](); } catch (e) {} delete boardMsgListeners[docId]; }
        const initialBox = document.getElementById(`bcomments-${docId}`);
        if (initialBox) initialBox.innerHTML = "<p style='color:#aaa; font-size:12px; text-align:center; padding:8px;'>대화 연결 중... ⏳</p>";
        const timeoutHandle = setTimeout(() => {
            const box = document.getElementById(`bcomments-${docId}`);
            if (box && box.innerText.includes("연결 중")) box.innerHTML = "<p style='color:#c00; font-size:12px; padding:8px;'>⚠️ 응답이 늦어요. 새로고침 해주세요.</p>";
        }, 3000);
        boardMsgListeners[docId] = db.collection("board_posts").doc(docId).collection("messages").orderBy("timestamp", "asc").onSnapshot(snap => {
            clearTimeout(timeoutHandle);
            const box = document.getElementById(`bcomments-${docId}`);
            const countTag = document.getElementById(`bcount-${docId}`);
            const newBadge = document.getElementById(`bnew-${docId}`);
            const itemEl = document.getElementById(`bpost-${docId}`);
            if (!box) return;
            if (snap.empty) { box.innerHTML = "<p style='color:#999; font-size:12px; text-align:center; padding:8px 0;'>아직 답장이 없어요.</p>"; if (countTag) countTag.innerText = "(0)"; return; }
            if (countTag) countTag.innerText = `(${snap.size})`;
            box.innerHTML = "";
            let lastIsAdmin = false;
            let hasNewAdminReply = false;
            const lastSeen = parseInt(localStorage.getItem(LAST_SEEN_BOARD_KEY) || '0');
            snap.forEach(c => {
                const md = c.data();
                const role = md.role || (md.sender === '관리자' ? 'admin' : 'worker');
                const isAdmin = role === 'admin';
                const myName = localStorage.getItem("logipan_user_name") || "";
                const isMine = !isAdmin && md.sender === myName;
                lastIsAdmin = isAdmin;
                const ts = md.timestamp;
                const tsMillis = ts ? ts.seconds * 1000 : 0;
                if (isAdmin && tsMillis > lastSeen) hasNewAdminReply = true;
                const timeStr = ts ? new Date(tsMillis).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const cleanText = (md.text || '').replace(/^\(사진\)$/, '');
                const bubble = document.createElement("div");
                bubble.className = `comment-bubble ${isAdmin ? 'admin-msg' : 'user-msg'}`;
                const editedTag = md.edited ? ' <span style="color:#999;font-size:10px;">(수정됨)</span>' : '';
                const editBtns = isMine ? `
                    <span style="float:right;">
                        <button onclick="editMyComment('board_posts', '${docId}', '${c.id}', 'messages', ${JSON.stringify(cleanText)})" style="border:none;background:none;color:#1a73e8;cursor:pointer;font-size:11px;">수정</button>
                        <button onclick="deleteMyComment('board_posts', '${docId}', '${c.id}', 'messages')" style="border:none;background:none;color:#ff4d4f;cursor:pointer;font-size:11px;">삭제</button>
                    </span>` : '';
                bubble.innerHTML = `<span style="font-size:11px; font-weight:bold; color:${isAdmin?'#1a73e8':'#555'}">${isAdmin ? '📢 ' : '👤 '}${escapeHtml(md.sender || '?')}</span><span style="font-size:10px; color:#999; margin-left:6px;">${timeStr}</span>${editedTag}${editBtns}<br>${escapeHtml(cleanText)}${md.imageUrl ? `<br><img src="${md.imageUrl}" onclick="openLightbox('${md.imageUrl}')" style="max-width:100%; max-height:200px; border-radius:6px; margin-top:6px; cursor:pointer;">` : ''}`;
                box.appendChild(bubble);
            });
            if (newBadge) newBadge.innerHTML = (lastIsAdmin && hasNewAdminReply) ? '<span class="new-badge">NEW</span>' : '';
            if (itemEl) { if (hasNewAdminReply) itemEl.classList.add('has-new'); else itemEl.classList.remove('has-new'); }
            if (hasNewAdminReply && document.getElementById('section-board').style.display === 'none') document.getElementById('dot-board').style.display = 'block';
        }, err => {
            clearTimeout(timeoutHandle);
            const box = document.getElementById(`bcomments-${docId}`);
            if (box) box.innerHTML = `<p style='color:#c00; font-size:12px; padding:8px;'>⚠️ ${escapeHtml(err.message || '오류')}</p>`;
        });
    }

    async function uploadImageToImgbb(file) {
        const formData = new FormData();
        formData.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
        const json = await res.json();
        if (json.success) return json.data.url;
        throw new Error("이미지 업로드 실패");
    }

    async function sendBoardReply(docId) {
        const input = document.getElementById(`binput-${docId}`);
        const photoInput = document.getElementById(`bphoto-${docId}`);
        const info = document.getElementById(`bphotoinfo-${docId}`);
        const name = document.getElementById('userName').value;
        const text = input.value.trim();
        const hasPhoto = photoInput && photoInput.files.length > 0;
        if (!text && !hasPhoto) return;
        try {
            let imageUrl = '';
            if (hasPhoto) {
                info.innerText = '📤 사진 업로드 중...';
                imageUrl = await uploadImageToImgbb(photoInput.files[0]);
            }
            await db.collection("board_posts").doc(docId).collection("messages").add({
                sender: name, role: "worker", text: text,
                imageUrl: imageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("board_posts").doc(docId).update({ status: "💬 대화중" });
            input.value = "";
            if (photoInput) photoInput.value = "";
            if (info) info.innerText = '';
        } catch (e) {
            if (info) info.innerText = '';
            alert("답장 전송 실패: " + e.message);
        }
    }

    async function submitBoard() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('boardText').value.trim();
        if (!text) return alert("내용을 입력해주세요!");
        const loading = document.getElementById('loading');
        document.getElementById('loadingMsg').innerText = "메시지 전송 중...";
        document.getElementById('loading-progress').style.display = 'none';
        loading.style.display = "block";
        try {
            await db.collection("board_posts").add({
                user: name, real_sender: name, category: "문의", receiver: "all",
                text: text, status: "신규", timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('boardText').value = "";
            clearBoardDraft(true);
            showToast("✅ 메시지가 전송되었습니다!");
        } catch(e) { alert("오류: " + e.message); }
        loading.style.display = "none";
    }

    function showToast(msg) {
        const div = document.createElement('div');
        div.innerText = msg;
        div.style.cssText = `position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: #323232; color: white; padding: 12px 24px; border-radius: 25px; font-size: 14px; z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.3);`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    // [추가] 새 메시지 카드 + 토스트 + 진동 시스템
    let knownBoardIds = new Set();  // 이미 본 게시글 ID 캐시
    let firstBoardLoad = true;       // 첫 로드 플래그 (처음엔 알림 X)
    let newMsgCount = 0;             // 현장보고 탭에 있을 때 누적된 개수

    function showMsgToast(senderName, preview, onClickFn) {
        // 같은 토스트 중복 방지 - 기존 있으면 제거
        const existing = document.querySelector('.msg-toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.className = 'msg-toast';
        const cleanPreview = (preview || '').replace(/\n/g, ' ').slice(0, 50);
        toast.innerHTML = `
            <div class="title">🔔 ${escapeHtml(senderName)}님의 메시지</div>
            <div class="preview">${escapeHtml(cleanPreview)}${cleanPreview.length >= 50 ? '...' : ''}</div>
        `;
        toast.onclick = () => {
            toast.remove();
            if (onClickFn) onClickFn();
        };
        document.body.appendChild(toast);
        setTimeout(() => {
            if (toast.parentNode) {
                toast.style.transition = 'opacity 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }
        }, 4000);
    }

    function vibrateDevice() {
        // 짧은 진동 (200ms)
        try {
            if ('vibrate' in navigator) {
                navigator.vibrate(200);
            }
        } catch (e) { /* 미지원 무시 */ }
    }

    function updateNewMsgCard() {
        const card = document.getElementById('newMsgCard');
        const cardTitle = document.getElementById('newMsgCardTitle');
        const cardCount = document.getElementById('newMsgCardCount');
        if (!card) return;
        if (newMsgCount > 0) {
            card.style.display = 'flex';
            cardTitle.innerText = `🔔 새 메시지 ${newMsgCount}건이 있어요`;
            cardCount.innerText = '눌러서 확인하기';
        } else {
            card.style.display = 'none';
        }
    }

    function goToBoardFromCard() {
        newMsgCount = 0;
        updateNewMsgCard();
        switchTab('board');
    }

    // 새 메시지 알림 트리거 (loadNotice / loadMyBoardPosts에서 호출)
    function triggerNewMsgAlert(senderName, preview, docId) {
        // 첫 로드는 알림 X (이미 있던 거 다 새 거로 처리되니까)
        if (firstBoardLoad) return;
        // 이미 본 거면 skip
        if (knownBoardIds.has(docId)) return;
        knownBoardIds.add(docId);

        // 공지/소통 탭 보고 있으면 알림 X
        const boardVisible = document.getElementById('section-board').style.display !== 'none';
        if (boardVisible) return;

        // 빨간 점 (이미 다른 로직에서 처리되지만 강제 ON)
        document.getElementById('dot-board').style.display = 'block';

        // 현장보고 탭에 알림 카드
        newMsgCount++;
        updateNewMsgCard();

        // 토스트 + 진동
        showMsgToast(senderName, preview, () => switchTab('board'));
        vibrateDevice();
    }

    let noticeStep = 0;
    function handleNoticeStep(targetStep) {
        const listDiv = document.getElementById("notice-list-all");
        if (targetStep === 0) { noticeStep = 0; listDiv.style.display = "none"; renderNoticeButtons(); return; }
        noticeStep = targetStep;
        listDiv.style.display = "block";
        renderNoticeButtons();
        loadNoticesByStep(noticeStep === 1 ? 5 : '7days');
    }
    function renderNoticeButtons() {
        const btnContainer = document.getElementById("notice-btn-container");
        if (!btnContainer) return;
        if (noticeStep === 0) {
            btnContainer.innerHTML = `<button id="notice-step-btn" onclick="handleNoticeStep(1)" style="background:none; border:none; color:#f39c12; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">📜 이전 공지 보기 (최근 5개) ▼</button>`;
        } else if (noticeStep === 1) {
            btnContainer.innerHTML = `<button onclick="handleNoticeStep(2)" style="background:none; border:none; color:#f39c12; font-size:12px; font-weight:bold; cursor:pointer; padding:0; margin-right:15px;">📅 최근 7일 내역 더보기 ▼</button><button onclick="handleNoticeStep(0)" style="background:none; border:none; color:#999; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">▲ 접기</button>`;
        } else if (noticeStep === 2) {
            btnContainer.innerHTML = `<button onclick="handleNoticeStep(0)" style="background:none; border:none; color:#999; font-size:12px; font-weight:bold; cursor:pointer; padding:0;">▲ 모든 공지 리스트 접기</button>`;
        }
    }
    function loadNoticesByStep(mode) {
        const container = document.getElementById("all-notices");
        let query = db.collection("board_posts").where("category", "==", "공지").orderBy("timestamp", "desc");
        if (mode === 5) query = query.limit(5);
        else if (mode === '7days') {
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            query = query.where("timestamp", ">=", sevenDaysAgo);
        }
        query.get().then(snap => {
            container.innerHTML = "";
            if (snap.empty) { container.innerHTML = "<p style='color:#999; text-align:center; padding:10px;'>해당하는 공지가 없습니다.</p>"; return; }
            let renderedCount = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if (d.status && d.status.includes("완료")) return;
                const date = d.timestamp ? new Date(d.timestamp.seconds * 1000).toLocaleDateString() : "날짜미상";
                const sender = d.real_sender || d.user || "관리자";
                const item = document.createElement("div");
                item.style = "padding:12px 0; border-bottom:1px solid #eee;";
                item.innerHTML = `<div style="font-size:11px; color:#f39c12; font-weight:bold; margin-bottom:4px;">📌 ${date} · ${escapeHtml(sender)}</div><div style="color:#444; line-height:1.5; white-space: pre-wrap; font-size:13px;">${escapeHtml(d.text)}</div>`;
                container.appendChild(item);
                renderedCount++;
            });
            if (renderedCount === 0) container.innerHTML = "<p style='color:#999; text-align:center; padding:10px;'>해당하는 공지가 없습니다.</p>";
        });
    }

    let reportListener = null;
    function getFormattedDate() {
        const now = new Date();
        return `${String(now.getFullYear()).slice(-2)}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
    }
    function loadActiveReports() {
        const name = localStorage.getItem("logipan_user_name");
        if (!name) return;
        document.getElementById("listTitle").innerText = "⏳ 현재 진행 중인 작업";
        if (reportListener) reportListener();
        reportListener = db.collection("field_reports").where("user", "==", name).where("status", "==", "⏳ 처리중").onSnapshot(snap => { renderList(snap); });
    }
    async function searchReports() {
        const name = localStorage.getItem("logipan_user_name");
        let keyword = document.getElementById("searchKeyword").value.trim();
        if (!keyword) { loadActiveReports(); return; }
        if (reportListener) reportListener();
        document.getElementById("listTitle").innerText = `🔍 '${keyword}' 검색 결과 (완료 포함)`;
        if (keyword.length === 6 && !isNaN(keyword)) keyword = `${keyword.slice(0,2)}/${keyword.slice(2,4)}/${keyword.slice(4,6)}`;
        const snap = await db.collection("field_reports").where("user", "==", name).get();
        renderList(snap, keyword);
    }
    function renderList(snap, kw = null) {
        const listDiv = document.getElementById("reportList");
        listDiv.innerHTML = "";
        let docs = [];
        snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
        docs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        docs.forEach(data => {
            if (kw && !((data.date||'') + (data.title||'') + (data.text||'')).toLowerCase().includes(kw.toLowerCase())) return;
            const isDone = data.status === "✅ 완료";
            const imgUrls = data.imageUrl ? data.imageUrl.split(",").filter(u => u.trim()) : [];
            const item = document.createElement("div");
            item.className = `report-item ${isDone ? 'done' : ''}`;
            item.id = `rpost-${data.id}`;
            let photosHtml = '';
            if (imgUrls.length > 0) {
                photosHtml = '<div class="attached-photos">';
                imgUrls.forEach(url => { const safeUrl = url.replace(/"/g, '&quot;'); photosHtml += `<img src="${safeUrl}" onclick="openLightbox('${safeUrl}')" loading="lazy">`; });
                photosHtml += '</div>';
            }
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div class="status-badge ${isDone ? 'done' : 'wait'}">${escapeHtml(data.status || '')}</div>
                    ${!isDone ? `<div>
                        <button onclick="editMyReport('${data.id}', ${JSON.stringify(data.title || '')}, ${JSON.stringify(data.text || '')})" style="border:none; background:none; color:#1a73e8; cursor:pointer; font-size:12px;">✏️ 수정</button>
                        <button onclick="deleteMyReport('${data.id}')" style="border:none; background:none; color:#ff4d4f; cursor:pointer; font-size:12px;">🗑️ 삭제</button>
                    </div>` : ''}
                </div>
                <div style="font-weight:bold; font-size:15px;">${escapeHtml(data.title || '')}${data.edited ? ' <span style="color:#999;font-size:11px;font-weight:normal;">(수정됨)</span>' : ''}</div>
                <div style="font-size:13px; color:#666; margin-top:5px; white-space:pre-wrap;">${escapeHtml(data.text || '')}</div>
                ${photosHtml}
                <button onclick="toggleComments('${data.id}')" style="background:none;border:none;color:#1a73e8;font-size:13px;font-weight:bold;margin-top:10px;display:block; padding:0;">
                    💬 대화 보기 <span id="count-${data.id}">(...)</span><span id="new-${data.id}"></span>
                </button>
                <div id="sec-${data.id}" class="comment-section">
                    <div id="comments-${data.id}"></div>
                    <div style="display:flex; gap:5px; margin-top:10px; align-items:center;">
                        <input type="text" id="input-${data.id}" placeholder="답장 입력" style="flex:1; padding:8px; font-size:13px;">
                        <label for="rphoto-${data.id}" style="background:#f0f2f5; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:13px;" title="사진 첨부">📷</label>
                        <input type="file" id="rphoto-${data.id}" accept="image/*" style="display:none;" onchange="markReportPhoto('${data.id}')">
                        <button onclick="sendReply('${data.id}')" style="background:#1a73e8; color:white; border:none; border-radius:6px; padding:0 12px; font-weight:bold;">전송</button>
                    </div>
                    <div id="rphotoinfo-${data.id}" style="font-size:11px; color:#1a73e8; margin-top:4px;"></div>
                </div>
            `;
            listDiv.appendChild(item);
            loadComments(data.id);
        });
        if (docs.length === 0) listDiv.innerHTML = "<p style='color:#999; font-size:13px; text-align:center; padding:20px 0;'>표시할 작업이 없습니다.</p>";
    }

    function loadComments(docId) {
        db.collection("field_reports").doc(docId).collection("comments").orderBy("timestamp", "asc").onSnapshot(snap => {
            const box = document.getElementById(`comments-${docId}`);
            const countTag = document.getElementById(`count-${docId}`);
            const newBadge = document.getElementById(`new-${docId}`);
            const itemEl = document.getElementById(`rpost-${docId}`);
            if (!box) return;
            const myName = localStorage.getItem("logipan_user_name") || "";
            if (snap.empty) { box.innerHTML = "대화 없음"; if (countTag) countTag.innerText = "(0)"; return; }
            if (countTag) countTag.innerText = `(${snap.size})`;
            box.innerHTML = "";
            let lastIsAdmin = false;
            let hasNewAdminReply = false;
            const lastSeen = parseInt(localStorage.getItem(LAST_SEEN_REPORT_KEY) || '0');
            snap.forEach(c => {
                const d = c.data();
                const text = d.text || '';
                const userName = d.user || '';
                const explicitRole = d.role;
                let isAdmin;
                if (explicitRole === 'admin') isAdmin = true;
                else if (explicitRole === 'worker') isAdmin = false;
                else if (text.startsWith('[답장]') && userName === myName) isAdmin = false;
                else isAdmin = true;
                const isMine = !isAdmin && userName === myName;
                lastIsAdmin = isAdmin;
                const ts = d.timestamp;
                const tsMillis = ts ? ts.seconds * 1000 : 0;
                if (isAdmin && tsMillis > lastSeen) hasNewAdminReply = true;
                const timeStr = ts ? new Date(tsMillis).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const displayName = userName || (isAdmin ? '관리자' : '나');
                const cleanText = text.replace(/^\[답장\]\s*/, '').replace(/^\(사진\)$/, '');
                const bubble = document.createElement("div");
                bubble.className = `comment-bubble ${isAdmin ? 'admin-msg' : 'user-msg'}`;
                const editedTag = d.edited ? ' <span style="color:#999;font-size:10px;">(수정됨)</span>' : '';
                const editBtns = isMine ? `
                    <span style="float:right;">
                        <button onclick="editMyComment('field_reports', '${docId}', '${c.id}', 'comments', ${JSON.stringify(cleanText)})" style="border:none;background:none;color:#1a73e8;cursor:pointer;font-size:11px;">수정</button>
                        <button onclick="deleteMyComment('field_reports', '${docId}', '${c.id}', 'comments')" style="border:none;background:none;color:#ff4d4f;cursor:pointer;font-size:11px;">삭제</button>
                    </span>` : '';
                bubble.innerHTML = `<span style="font-size:11px; font-weight:bold; color:${isAdmin?'#1a73e8':'#555'}">${isAdmin ? '📢 ' : '👤 '}${escapeHtml(displayName)}</span><span style="font-size:10px; color:#999; margin-left:6px;">${timeStr}</span>${editedTag}${editBtns}<br>${escapeHtml(cleanText)}${d.imageUrl ? `<br><img src="${d.imageUrl}" onclick="openLightbox('${d.imageUrl}')" style="max-width:100%; max-height:200px; border-radius:6px; margin-top:6px; cursor:pointer;">` : ''}`;
                box.appendChild(bubble);
            });
            if (newBadge) newBadge.innerHTML = (lastIsAdmin && hasNewAdminReply) ? '<span class="new-badge">NEW</span>' : '';
            if (itemEl) { if (hasNewAdminReply) itemEl.classList.add('has-new'); else itemEl.classList.remove('has-new'); }
            if (hasNewAdminReply && document.getElementById('section-report').style.display === 'none') document.getElementById('dot-report').style.display = 'block';
        });
    }

    async function uploadAndSend() {
        const name = document.getElementById('userName').value;
        const title = document.getElementById('reportTitle').value.trim();
        const text = document.getElementById('reportText').value.trim();

        // [추가] 작업 종류 필수 검증
        if (!selectedCategory) {
            alert("⚠️ 작업 종류를 선택해주세요!\n(매입 / 위탁 / 이관 / 기타)");
            return;
        }
        if (!title || !text) return alert("제목과 내용을 입력해주세요!");

        // [추가] 제목 앞에 [매입] 같은 prefix 자동 추가 (이미 있으면 중복 안 붙임)
        let finalTitle = title;
        if (!finalTitle.startsWith(`[${selectedCategory}]`)) {
            finalTitle = `[${selectedCategory}] ${finalTitle}`;
        }

        const loading = document.getElementById('loading');
        const progressBox = document.getElementById('loading-progress');
        const progressBar = document.getElementById('loading-progress-bar');
        const msg = document.getElementById('loadingMsg');
        loading.style.display = "block";
        let imageUrls = [];
        try {
            const total = selectedFiles.length;
            if (total > 0) { progressBox.style.display = 'block'; progressBar.style.width = '0%'; }
            else progressBox.style.display = 'none';
            for (let i = 0; i < total; i++) {
                msg.innerText = `사진 업로드 중... (${i+1}/${total})`;
                progressBar.style.width = `${Math.round((i / total) * 100)}%`;
                let formData = new FormData();
                formData.append("image", selectedFiles[i]);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                const json = await res.json();
                if (json.success) imageUrls.push(json.data.url);
            }
            if (total > 0) progressBar.style.width = '100%';
            msg.innerText = "전송 중...";
            await db.collection("field_reports").add({
                user: name,
                title: finalTitle,  // [수정] prefix 붙은 제목
                work_category: selectedCategory,  // [추가] 작업 종류 별도 필드 (필터링/통계용)
                text: text,
                date: getFormattedDate(),
                imageUrl: imageUrls.join(","),
                status: "⏳ 처리중",
                comment_count: 0,
                has_attached_image: imageUrls.length > 0,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('reportTitle').value = '';
            document.getElementById('reportText').value = '';
            // [추가] 작업 종류 초기화
            selectedCategory = null;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            selectedFiles = [];
            renderPhotoPreview();
            clearReportDraft(true);
            showToast("✅ 보고가 전송되었습니다!");
        } catch (e) { alert("오류: " + e.message); }
        loading.style.display = "none";
        progressBox.style.display = 'none';
    }

    function toggleComments(docId) {
        const sec = document.getElementById(`sec-${docId}`);
        const newOpen = sec.style.display !== "block";
        sec.style.display = newOpen ? "block" : "none";
        if (newOpen) {
            localStorage.setItem(LAST_SEEN_REPORT_KEY, Date.now().toString());
            document.getElementById('dot-report').style.display = 'none';
            const itemEl = document.getElementById(`rpost-${docId}`);
            if (itemEl) itemEl.classList.remove('has-new');
            const newBadge = document.getElementById(`new-${docId}`);
            if (newBadge) newBadge.innerHTML = '';
        }
    }

    async function sendReply(docId) {
        const input = document.getElementById(`input-${docId}`);
        const photoInput = document.getElementById(`rphoto-${docId}`);
        const info = document.getElementById(`rphotoinfo-${docId}`);
        const name = document.getElementById('userName').value;
        const text = input.value.trim();
        const hasPhoto = photoInput && photoInput.files.length > 0;
        if (!text && !hasPhoto) return;
        try {
            let imageUrl = '';
            if (hasPhoto) {
                if (info) info.innerText = '📤 사진 업로드 중...';
                imageUrl = await uploadImageToImgbb(photoInput.files[0]);
            }
            await db.collection("field_reports").doc(docId).collection("comments").add({
                user: name, role: "worker",
                text: text ? "[답장] " + text : "[답장] (사진)",
                imageUrl: imageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            // [추가] 본문에 메타 캐싱 (Firestore 읽기 비용 절약)
            try {
                await db.collection("field_reports").doc(docId).update({
                    comment_count: firebase.firestore.FieldValue.increment(1),
                    last_comment_text: text || "(사진)",
                    last_comment_user: name,
                    last_comment_role: 'worker',
                    last_comment_at: firebase.firestore.FieldValue.serverTimestamp(),
                    has_attached_image: imageUrl ? true : firebase.firestore.FieldValue.delete()
                });
            } catch (metaErr) { console.warn('메타 업데이트 실패:', metaErr); }
            input.value = "";
            if (photoInput) photoInput.value = "";
            if (info) info.innerText = '';
        } catch (e) {
            if (info) info.innerText = '';
            alert("답장 전송 실패: " + e.message);
        }
    }

    async function deleteMyPost(docId) {
        if (!confirm("작성하신 메시지를 삭제하시겠습니까?\n(딸린 답글도 함께 삭제됩니다)")) return;
        try {
            // 서브컬렉션 messages도 같이 삭제
            const msgs = await db.collection("board_posts").doc(docId).collection("messages").get();
            const batch = db.batch();
            msgs.forEach(m => batch.delete(m.ref));
            batch.delete(db.collection("board_posts").doc(docId));
            await batch.commit();
            showToast("✅ 삭제되었습니다.");
        } catch (e) { alert("삭제 중 오류: " + e.message); }
    }

    // [추가] 공지/소통 - 내가 쓴 글 수정
    async function editMyPost(docId, currentText) {
        const newText = prompt("내용 수정:", currentText);
        if (newText === null) return;  // 취소
        const trimmed = newText.trim();
        if (!trimmed) { alert("내용을 입력해주세요"); return; }
        try {
            await db.collection("board_posts").doc(docId).update({
                text: trimmed,
                edited: true,
                editedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast("✅ 수정되었습니다.");
        } catch (e) { alert("수정 중 오류: " + e.message); }
    }

    // [추가] 작업보고 - 내가 쓴 글 삭제
    async function deleteMyReport(docId) {
        if (!confirm("작성하신 작업보고를 삭제하시겠습니까?\n(딸린 댓글도 함께 삭제됩니다)")) return;
        try {
            const cmts = await db.collection("field_reports").doc(docId).collection("comments").get();
            const batch = db.batch();
            cmts.forEach(c => batch.delete(c.ref));
            batch.delete(db.collection("field_reports").doc(docId));
            await batch.commit();
            showToast("✅ 삭제되었습니다.");

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function isLocationBarcode(code) {

    // ─── 피드백 (소리/진동/음성/시각) ─────────────────────────
    let _beepCtx = null;
    function getAudioCtx() {
        if (!_beepCtx) {
            try {
                _beepCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { _beepCtx = null; }
        }
        return _beepCtx;
    }
    function beep(freq, durationMs) {
        if (!soundEnabled) return;
        try {
            const ctx = getAudioCtx();
            if (!ctx) return;
            // iOS는 컨텍스트가 자주 잠들어서 매번 resume 시도
            if (ctx.state === 'suspended') {
                ctx.resume().catch(()=>{});
            }
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, ctx.currentTime);  // 볼륨 키움 (0.15 → 0.3)
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + durationMs/1000);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + durationMs/1000);
        } catch(e) {
            console.warn("beep 실패:", e);
        }
    }
    function vibrate(pattern) {
        if (!vibrateEnabled) return;
        try {
            if ('vibrate' in navigator) {
                const ok = navigator.vibrate(pattern);
                if (!ok) console.warn("vibrate 호출 실패 (브라우저가 거부)");
            } else {
                console.warn("vibrate API 미지원");
            }
        } catch(e) {
            console.warn("vibrate 예외:", e);
        }
    }
    function speak(text) {
        // 음성은 항상 (소리 ON일 때만) - 특이 상황만 호출됨
        if (!soundEnabled) return;
        try {
            if (!('speechSynthesis' in window)) return;
            // 진행 중인 거 정리
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ko-KR';
            u.rate = 1.5;
            u.volume = 1;
            speechSynthesis.speak(u);
        } catch(e) {}
    }
    function showFeedback(msg, kind) {

        el.style.display = 'block';
        clearTimeout(showFeedback._timer);
        showFeedback._timer = setTimeout(() => {
            el.style.display = 'none';
        }, 2500);
    }

    // [추가] 화면 플래시 - 무음모드에서도 시각으로 인지

        // 기존 플래시 있으면 제거 (연속 스캔 시 깔끔하게)

        flash.innerHTML = `

                <div class="flash-label">${escapeHtml(label)}</div>
